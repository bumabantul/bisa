<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>Login - BUMA Bantul</title>
  <link rel="icon" type="image/webp" href="assets/logo buma.webp">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --secondary: #8b5cf6;
      --accent: #06b6d4;
      --dark: #0f172a;
      --light: #f8fafc;
      --card-bg: #ffffff;
      --glass-bg: rgba(255, 255, 255, 0.75);
      --text: #1e293b;
      --text-muted: #64748b;
      --shadow-lg: 0 20px 40px rgba(0,0,0,0.08);
      --radius: 20px;
      --transition: 0.3s;
    }
    * { font-family: 'Plus Jakarta Sans', sans-serif; }
    body {
      background: linear-gradient(160deg, #1e1b4b 0%, #312e81 40%, #4338ca 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      margin: 0;
      padding: 1.5rem;
    }
    .card {
      border: none;
      border-radius: var(--radius);
      box-shadow: 0 25px 60px rgba(0,0,0,0.3);
      overflow: hidden;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      width: 100%;
      max-width: 450px;
    }
    .card-header {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      text-align: center;
      padding: 2rem 1.5rem;
      border-bottom: none;
    }
    .card-header h3 { margin: 0; font-weight: 700; font-size: 1.5rem; letter-spacing: -0.3px; }
    .card-header p { opacity: 0.85; margin: 0.5rem 0 0; font-weight: 400; font-size: 0.95rem; }
    .card-body { padding: 2rem; }
    .form-control {
      border-radius: 14px;
      padding: 12px 18px;
      border: 2px solid #e8ecf1;
      transition: var(--transition);
      font-size: 0.95rem;
      background: #fafbfc;
    }
    .form-control:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(99,102,241,0.08);
      background: #fff;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border: none;
      border-radius: 50px;
      padding: 12px 28px;
      font-weight: 600;
      transition: var(--transition);
      box-shadow: 0 6px 18px rgba(99,102,241,0.3);
      color: #fff;
      font-size: 1rem;
      width: 100%;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(99,102,241,0.4);
    }
    .btn-primary:disabled {
      background: #b0b0b0;
      transform: none;
      box-shadow: none;
      cursor: not-allowed;
    }
    .btn-success {
      background: linear-gradient(135deg, #10b981, #059669);
      border: none;
      border-radius: 50px;
      padding: 12px 28px;
      font-weight: 600;
      transition: var(--transition);
      color: #fff;
      width: 100%;
    }
    .btn-success:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(16,185,129,0.4);
    }
    a { color: var(--primary); text-decoration: none; font-weight: 500; }
    a:hover { text-decoration: underline; }
    .alert { border-radius: var(--radius); font-weight: 500; }
    hr { border-top: 1px solid #e8ecf1; }
    .modal-content {
      border: none;
      border-radius: var(--radius);
      box-shadow: 0 25px 60px rgba(0,0,0,0.3);
      overflow: hidden;
    }
    .modal-header {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #fff;
      border-bottom: none;
      padding: 1.5rem;
    }
    .modal-title { font-weight: 700; letter-spacing: -0.3px; }
    .btn-close { filter: brightness(0) invert(1); }
    .back-link {
      color: rgba(255, 255, 255, 0.8);
      text-decoration: none;
      font-weight: 500;
      transition: var(--transition);
      font-size: 0.95rem;
    }
    .back-link:hover { color: #fff; }
    .password-toggle {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #64748b;
      cursor: pointer;
      z-index: 10;
    }
    .password-wrapper { position: relative; }
    .password-wrapper .form-control { padding-right: 45px; }
  </style>
</head>
<body>

  <!-- Card Login -->
  <div class="card">
    <div class="card-header">
      <h3>Selamat Datang Kembali</h3>
      <p>Silakan login ke akun Anda</p>
    </div>
    <div class="card-body">
      <div id="loginAlert" class="alert alert-danger d-none"></div>
      <form id="loginForm">
        <div class="mb-3">
          <label class="form-label fw-semibold">Email</label>
          <input type="email" class="form-control" id="email" placeholder="nama@email.com" required>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Password</label>
          <div class="password-wrapper">
            <input type="password" class="form-control" id="password" placeholder="******" required>
            <button type="button" class="password-toggle" onclick="togglePassword('password', this)">
              <i class="bi bi-eye-slash"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" id="loginBtn">
          <span class="spinner-border spinner-border-sm d-none" role="status" id="loginSpinner"></span>
          <span id="loginText">Login</span>
        </button>
      </form>
      <hr class="my-4">
      <p class="text-center mb-0">
        Belum punya akun? <a href="#" data-bs-toggle="modal" data-bs-target="#registerModal">Daftar sebagai Member</a>
      </p>
    </div>
  </div>

  <div class="mt-4 text-center">
    <a href="index.html" class="back-link"><i class="bi bi-arrow-left me-1"></i>Kembali ke Beranda</a>
  </div>

  <!-- Modal Register -->
  <div class="modal fade" id="registerModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Registrasi Member</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body p-4">
          <form id="registerForm">
            <div class="mb-3">
              <label class="fw-semibold">Nama Lengkap</label>
              <input type="text" class="form-control" id="regNama" required>
            </div>
            <div class="mb-3">
              <label class="fw-semibold">Email</label>
              <input type="email" class="form-control" id="regEmail" required>
            </div>
            <div class="mb-3">
              <label class="fw-semibold">Nomor HP/WhatsApp</label>
              <input type="tel" class="form-control" id="regPhone" placeholder="0812xxxxxxxx" required>
            </div>
            <div class="mb-3">
              <label class="fw-semibold">Password</label>
              <div class="password-wrapper">
                <input type="password" class="form-control" id="regPassword" required>
                <button type="button" class="password-toggle" onclick="togglePassword('regPassword', this)">
                  <i class="bi bi-eye-slash"></i>
                </button>
              </div>
            </div>
            <div class="mb-3">
              <label class="fw-semibold">Konfirmasi Password</label>
              <div class="password-wrapper">
                <input type="password" class="form-control" id="regConfirmPassword" required>
                <button type="button" class="password-toggle" onclick="togglePassword('regConfirmPassword', this)">
                  <i class="bi bi-eye-slash"></i>
                </button>
              </div>
            </div>
            <div class="mb-3">
              <label class="fw-semibold">Verifikasi: Berapa 2 + 3?</label>
              <input type="number" class="form-control" id="regVerifikasi" required min="0" max="10" placeholder="Jawab dengan angka">
            </div>
            <button type="submit" class="btn btn-success" id="registerBtn">
              <span class="spinner-border spinner-border-sm d-none" role="status" id="registerSpinner"></span>
              <span id="registerText">Daftar</span>
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>

  <script>
    // Toggle password visibility
    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      const icon = btn.querySelector('i');
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.remove('bi-eye-slash');
        icon.classList.add('bi-eye');
      } else {
        input.type = 'password';
        icon.classList.remove('bi-eye');
        icon.classList.add('bi-eye-slash');
      }
    }

    // Cek apakah sudah login
    (function() {
      const token = (typeof appStorage !== 'undefined') ? appStorage.get('token') : null;
      const role = (typeof appStorage !== 'undefined') ? appStorage.get('role') : null;
      if (token && role) {
        if (role === 'admin') {
          window.location.href = 'admin/dashboard-admin.html';
        } else if (role === 'member') {
          window.location.href = 'member/dashboard-member.html';
        }
      }
    })();

    // Login
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      const loginBtn = document.getElementById('loginBtn');
      const loginSpinner = document.getElementById('loginSpinner');
      const loginText = document.getElementById('loginText');

      loginBtn.disabled = true;
      loginSpinner.classList.remove('d-none');
      loginText.textContent = 'Memproses...';

      try {
        const res = await apiCall('login', { email, password });
        if (res.success) {
          appStorage.set('token', res.token);
          appStorage.set('role', res.role);
          appStorage.set('nama', res.nama);
          appStorage.set('userId', res.userId);

          if (res.role === 'admin') {
            window.location.href = 'admin/preload.html';
          } else {
            window.location.href = 'member/dashboard-member.html';
          }
        } else {
          const alertBox = document.getElementById('loginAlert');
          alertBox.textContent = res.message || 'Login gagal';
          alertBox.classList.remove('d-none');
          loginBtn.disabled = false;
          loginSpinner.classList.add('d-none');
          loginText.textContent = 'Login';
        }
      } catch (err) {
        alert('Error: ' + err.message);
        loginBtn.disabled = false;
        loginSpinner.classList.add('d-none');
        loginText.textContent = 'Login';
      }
    });

    // Registrasi
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      // Verifikasi penjumlahan
      const jawaban = parseInt(document.getElementById('regVerifikasi').value);
      if (jawaban !== 5) {
        alert('Jawaban verifikasi salah! Silakan coba lagi.');
        document.getElementById('regVerifikasi').value = '';
        document.getElementById('regVerifikasi').focus();
        return;
      }

      // Validasi password dan konfirmasi
      const password = document.getElementById('regPassword').value;
      const confirmPassword = document.getElementById('regConfirmPassword').value;
      if (password !== confirmPassword) {
        alert('Password dan Konfirmasi Password tidak cocok!');
        return;
      }

      const data = {
        nama: document.getElementById('regNama').value,
        email: document.getElementById('regEmail').value,
        phone: document.getElementById('regPhone').value,
        password: password
      };

      const registerBtn = document.getElementById('registerBtn');
      const registerSpinner = document.getElementById('registerSpinner');
      const registerText = document.getElementById('registerText');

      registerBtn.disabled = true;
      registerSpinner.classList.remove('d-none');
      registerText.textContent = 'Mendaftar...';

      try {
        const res = await apiCall('register', data);
        if (res.success) {
          alert('Registrasi berhasil, silakan login.');
          const modalEl = document.getElementById('registerModal');
          const modal = bootstrap.Modal.getInstance(modalEl);
          modal.hide();
          document.getElementById('registerForm').reset();
        } else {
          alert('Gagal: ' + res.message);
        }
      } catch (err) {
        alert('Error: ' + err.message);
      } finally {
        registerBtn.disabled = false;
        registerSpinner.classList.add('d-none');
        registerText.textContent = 'Daftar';
      }
    });

    // Reset form saat modal register ditutup
    document.getElementById('registerModal').addEventListener('hidden.bs.modal', function () {
      document.getElementById('registerForm').reset();
    });
  </script>
</body>
</html>
