<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>Data Anggota - BUMA Admin</title>
  <link rel="icon" type="image/webp" href="../assets/logo buma.webp">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #6366f1; --primary-dark: #4f46e5; --secondary: #8b5cf6; --accent: #06b6d4;
      --dark: #0f172a; --light: #f8fafc; --card-bg: #ffffff; --text: #1e293b;
      --text-muted: #64748b; --shadow-lg: 0 20px 40px rgba(0,0,0,0.08);
      --radius: 20px; --transition: 0.3s;
    }
    * { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent; padding: 0; overflow-y: auto; }
    .main-content { padding: 0; }
    .card {
      border: 1px solid rgba(0,0,0,0.04); border-radius: var(--radius); box-shadow: var(--shadow-lg);
      margin-bottom: 25px; background: white;
    }
    .card-header {
      background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #fff;
      font-weight: 600; padding: 18px 25px; border-radius: var(--radius) var(--radius) 0 0 !important;
    }
    .table { background: white; border-radius: 15px; overflow: hidden; }
    .table thead th { background: #f8fafc; font-weight: 600; text-transform: uppercase; }
    .foto-thumb { width: 50px; height: 50px; object-fit: cover; border-radius: 12px; }
    .btn-primary { background: linear-gradient(135deg, var(--primary), var(--secondary)); border: none; border-radius: 50px; padding: 10px 20px; font-weight: 600; color: #fff; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(99,102,241,0.4); }
    .btn-outline-primary, .btn-outline-secondary, .btn-outline-danger { border-radius: 50px; }
    .search-box { border-radius: 50px; border: 2px solid #e8ecf1; padding: 10px 20px; width: 250px; }
    #mapEdit { height: 250px; border-radius: 12px; border: 2px solid #e8ecf1; }
    .table-responsive { -webkit-overflow-scrolling: touch; }
    @media (max-width: 576px) {
      .search-box { width: 100%; }
      #usahaTable td:last-child { display: flex; flex-wrap: wrap; gap: 4px; }
      #usahaTable td:last-child .btn { padding: 4px 8px; font-size: 0.75rem; }
    }
    .pdf-progress-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255,255,255,0.85); backdrop-filter: blur(4px);
      z-index: 9999; display: flex; align-items: center; justify-content: center;
    }
    .pdf-progress-content { text-align: center; }
  </style>
</head>
<body>
  <div class="main-content">
    <div class="card">
      <div class="card-header d-flex flex-wrap justify-content-between align-items-center gap-2">
        <span><i class="bi bi-table"></i> Data Usaha Anggota</span>
        <div class="d-flex flex-wrap gap-2">
          <input type="text" id="searchInput" class="form-control search-box" placeholder="Cari...">
          <button class="btn btn-primary btn-sm rounded-pill" onclick="tambahUsaha()">+ Tambah</button>
          <button class="btn btn-outline-primary btn-sm rounded-pill" onclick="exportToCSV()">Ekspor CSV</button>
          <button class="btn btn-outline-primary btn-sm rounded-pill" onclick="exportKatalogPDF()">Katalog PDF</button>
          <button class="btn btn-outline-danger btn-sm rounded-pill" onclick="deleteSelected()">Hapus</button>
          <button class="btn btn-outline-secondary btn-sm rounded-pill" onclick="loadData(true)">Refresh</button>
        </div>
      </div>
      <div class="card-body">
        <div class="table-responsive">
          <table class="table table-hover align-middle" id="usahaTable">
            <thead><tr><th><input type="checkbox" id="selectAll" onclick="toggleSelectAll(this)"></th><th>Foto</th><th>Nama</th><th>Pemilik</th><th>Jenis</th><th>Alamat</th><th>Telepon</th><th>Deskripsi</th><th>Aksi</th></tr></thead>
            <tbody id="usahaTableBody"></tbody>
          </table>
        </div>
        <div class="d-flex justify-content-between align-items-center mt-2 flex-wrap">
          <div id="tableInfo" class="text-muted small"></div>
          <nav id="usahaPagination"></nav>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal View Detail -->
  <div class="modal fade" id="viewUsahaModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">Detail Usaha</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body" id="viewUsahaContent"></div>
      </div>
    </div>
  </div>

  <!-- Modal Tambah/Edit -->
  <div class="modal fade" id="editUsahaModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header"><h5 class="modal-title" id="editUsahaTitle">Tambah Usaha</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
          <form id="editUsahaForm" onsubmit="simpanUsaha(event)">
            <input type="hidden" id="editId">
            <div class="row">
              <div class="col-md-6 mb-3"><label class="form-label">Nama Usaha *</label><input type="text" class="form-control" id="editNamaUsaha" required></div>
              <div class="col-md-6 mb-3"><label class="form-label">Nama Pemilik *</label><input type="text" class="form-control" id="editPemilik" required></div>
            </div>
            <div class="row">
              <div class="col-md-6 mb-3"><label class="form-label">Asal PAC *</label>
                <select class="form-select" id="editAsalPac" required>
                  <option value="">Pilih Kapanewon</option>
                  <option>Bambanglipuro</option><option>Banguntapan</option><option>Bantul</option>
                  <option>Dlingo</option><option>Imogiri</option><option>Jetis</option>
                  <option>Kasihan</option><option>Kretek</option><option>Pajangan</option>
                  <option>Pandak</option><option>Piyungan</option><option>Pleret</option>
                  <option>Pundong</option><option>Sanden</option><option>Sedayu</option>
                  <option>Sewon</option><option>Srandakan</option>
                </select>
              </div>
              <div class="col-md-6 mb-3"><label class="form-label">Jenis Usaha *</label><input type="text" class="form-control" id="editJenisUsaha" required></div>
            </div>
            <div class="mb-3"><label class="form-label">Alamat *</label><textarea class="form-control" id="editAlamat" rows="2" required></textarea></div>
            <div class="row">
              <div class="col-md-6 mb-3"><label class="form-label">Telepon/WA</label><input type="text" class="form-control" id="editTelepon"></div>
              <div class="col-md-6 mb-3"><label class="form-label">URL Foto</label><input type="text" class="form-control" id="editFoto" placeholder="https://..."></div>
            </div>
            <div class="mb-3"><label class="form-label">Deskripsi</label><textarea class="form-control" id="editDeskripsi" rows="3"></textarea></div>
            <div class="mb-3">
              <label class="form-label">Lokasi Usaha *</label>
              <button type="button" class="btn btn-outline-primary btn-sm mb-2 rounded-pill" onclick="getCurrentLocationEdit()"><i class="bi bi-crosshair"></i> Dapatkan Lokasi Saya</button>
              <div id="mapEdit"></div>
              <div class="row mt-2">
                <div class="col-md-6"><label class="form-label small">Latitude</label><input type="text" class="form-control" id="editLat" readonly required></div>
                <div class="col-md-6"><label class="form-label small">Longitude</label><input type="text" class="form-control" id="editLng" readonly required></div>
              </div>
              <small class="text-muted">Klik atau geser marker pada peta.</small>
            </div>
            <div class="d-flex justify-content-end gap-2">
              <button type="button" class="btn btn-outline-secondary rounded-pill" data-bs-dismiss="modal">Batal</button>
              <button type="submit" class="btn btn-primary rounded-pill">Simpan</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="../js/api.js"></script>
  <script>
    (function() {
      // --- Auth ---
      const token = (typeof appStorage !== 'undefined' && appStorage.get('token')) || (window.top._authToken) || null;
      if (!token) { window.top.location.href = '../login.html'; return; }
      const role = (typeof appStorage !== 'undefined' && appStorage.get('role')) || (window.top._authRole) || null;
      if (role !== 'admin') { window.top.location.href = '../login.html'; return; }

      // --- Data State ---
      let currentDataUsaha = [], filteredDataUsaha = [];
      const PAGE_SIZE = 25; let usahaPage = 1;
      const CACHE_KEY = 'data_usaha_cache';

      // Cache helpers
      function saveCache(data) {
        try { if (typeof appStorage !== 'undefined') appStorage.set(CACHE_KEY, JSON.stringify(data)); } catch(e) {}
      }
      function loadCache() {
        try {
          const embedded = sessionStorage.getItem('data_usaha_embedded');
          if (embedded) return { data: JSON.parse(embedded), _ts: Date.now() };
        } catch(e) {}
        try {
          if (typeof appStorage !== 'undefined') {
            const raw = appStorage.get(CACHE_KEY);
            if (raw) { const parsed = JSON.parse(raw); return parsed.data ? parsed : { data: parsed, _ts: 0 }; }
          }
        } catch(e) {}
        if (window.top._fallbackCache && window.top._fallbackCache.data_usaha) {
          return { data: window.top._fallbackCache.data_usaha, _ts: 0 };
        }
        return null;
      }

      // Render awal dari cache
      (function() {
        const cached = loadCache();
        if (cached && cached.data) { currentDataUsaha = cached.data; applyFilter(); }
      })();

      async function loadData(force = false) {
        const cache = loadCache();
        if (!force && cache && cache._ts && (Date.now() - cache._ts) < 30000) return;
        try {
          const res = await apiCall('getDataUsaha', { token });
          if (res.success) {
            const newData = { data: res.data, _ts: Date.now() };
            const oldData = loadCache();
            if (force || JSON.stringify(oldData?.data) !== JSON.stringify(newData.data)) {
              currentDataUsaha = res.data; saveCache(newData); applyFilter();
            }
          } else if (force) { alert('Gagal memuat data: ' + res.message); }
        } catch(err) { if (force) alert('Error: ' + err.message); }
      }
      window.loadData = loadData;

      function applyFilter() {
        const kw = (document.getElementById('searchInput')?.value || '').trim().toLowerCase();
        filteredDataUsaha = currentDataUsaha.filter(item =>
          (item.namaUsaha||'').toLowerCase().includes(kw) ||
          (item.pemilik||'').toLowerCase().includes(kw) ||
          (item.jenisUsaha||'').toLowerCase().includes(kw) ||
          (item.alamat||'').toLowerCase().includes(kw)
        );
        usahaPage = 1; renderTable(); updatePagination();
      }

      function getPagedData(data, page) {
        const start = (page-1)*PAGE_SIZE;
        return data.slice(start, start+PAGE_SIZE);
      }

      function renderTable() {
        const tbody = document.getElementById('usahaTableBody');
        const paged = getPagedData(filteredDataUsaha, usahaPage);
        tbody.innerHTML = '';
        const frag = document.createDocumentFragment();
        paged.forEach(item => {
          let fotoHtml = '-';
          if (item.foto) {
            fotoHtml = `<img src="${item.foto}" class="foto-thumb" onerror="this.style.display='none'" alt="Foto" loading="lazy">`;
          }
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td><input type="checkbox" class="select-item" value="${item.id}"></td>
            <td>${fotoHtml}</td>
            <td><strong>${item.namaUsaha||''}</strong></td>
            <td>${item.pemilik||''}</td>
            <td><span class="badge bg-info bg-opacity-10 text-info">${item.jenisUsaha||''}</span></td>
            <td>${item.alamat||''}</td>
            <td>${item.telepon||'-'}</td>
            <td>${(item.deskripsi||'').substring(0,30)}</td>
            <td>
              <button class="btn btn-sm btn-info" onclick="viewUsaha('${item.id}')"><i class="bi bi-eye"></i></button>
              <button class="btn btn-sm btn-warning" onclick="editUsaha('${item.id}')"><i class="bi bi-pencil"></i></button>
              <button class="btn btn-sm btn-danger" onclick="deleteUsaha('${item.id}')"><i class="bi bi-trash"></i></button>
            </td>`;
          frag.appendChild(tr);
        });
        tbody.appendChild(frag);
        document.getElementById('tableInfo').innerText = `Menampilkan ${paged.length} dari ${filteredDataUsaha.length} data`;
        document.getElementById('selectAll').checked = false;
      }

      function updatePagination() {
        const container = document.getElementById('usahaPagination');
        const totalPages = Math.ceil(filteredDataUsaha.length / PAGE_SIZE);
        if (totalPages <= 1) { container.innerHTML = ''; return; }
        let html = '<ul class="pagination pagination-sm mb-0">';
        for (let i = 1; i <= totalPages; i++) {
          html += `<li class="page-item ${i===usahaPage?'active':''}"><a class="page-link" href="#" onclick="goToPage(${i})">${i}</a></li>`;
        }
        html += '</ul>'; container.innerHTML = html;
      }

      window.goToPage = function(page) { usahaPage = page; renderTable(); updatePagination(); };
      window.toggleSelectAll = function(src) {
        document.querySelectorAll('.select-item').forEach(cb => cb.checked = src.checked);
      };

      // Hapus massal
      window.deleteSelected = async function() {
        const ids = Array.from(document.querySelectorAll('.select-item:checked')).map(cb => cb.value);
        if (ids.length === 0) return alert('Pilih data yang akan dihapus.');
        if (!confirm(`Hapus ${ids.length} data?`)) return;
        for (const id of ids) { try { await apiCall('deleteDataUsaha', { token, id }); } catch(e) {} }
        await loadData(true);
        alert('Data terpilih dihapus.');
      };

      // Hapus satu
      window.deleteUsaha = async function(id) {
        if (!confirm('Hapus data ini?')) return;
        try {
          const res = await apiCall('deleteDataUsaha', { token, id });
          if (res.success) { alert('Data dihapus.'); await loadData(true); }
          else alert('Gagal: ' + res.message);
        } catch(e) { alert('Error: ' + e.message); }
      };

      // Ekspor CSV
      window.exportToCSV = function() {
        const data = filteredDataUsaha.length > 0 ? filteredDataUsaha : currentDataUsaha;
        if (data.length === 0) return alert('Tidak ada data.');
        let csv = 'ID,Nama Usaha,Pemilik,Asal PAC,Jenis Usaha,Alamat,Telepon,Deskripsi,Lat,Lng\n';
        data.forEach(item => {
          csv += `${item.id},"${item.namaUsaha}","${item.pemilik}","${item.asalPac||''}","${item.jenisUsaha}","${item.alamat}","${item.telepon||''}","${(item.deskripsi||'').replace(/"/g,'""')}","${item.lat||''}","${item.lng||''}"\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `data_usaha_buma_${new Date().toISOString().slice(0,10)}.csv`;
        a.click();
      };

      // ========== KATALOG PDF (PROFESIONAL) ==========
      function loadJSPDF() {
        return new Promise((resolve, reject) => {
          if (window.jspdf) return resolve();
          const s1 = document.createElement('script');
          s1.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
          s1.onload = () => {
            const s2 = document.createElement('script');
            s2.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js';
            s2.onload = resolve; s2.onerror = reject;
            document.head.appendChild(s2);
          };
          s1.onerror = reject; document.head.appendChild(s1);
        });
      }

      async function getBase64FromUrl(url) {
        if (url.startsWith('data:')) return url;
        try {
          const res = await fetch(url);
          const blob = await res.blob();
          return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onloadend = () => resolve(reader.result);
            reader.onerror = reject;
            reader.readAsDataURL(blob);
          });
        } catch(e) { return null; }
      }

      async function generateKatalogPDF(data) {
        const logoUrl = '../assets/logo buma.webp';
        const logoB64 = await getBase64FromUrl(logoUrl);
        const fotoCache = new Map();
        // Pre-fetch foto (kecuali base64)
        for (const item of data) {
          if (item.foto && !item.foto.startsWith('data:') && !fotoCache.has(item.foto)) {
            fotoCache.set(item.foto, await getBase64FromUrl(item.foto));
          }
        }

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('portrait', 'mm', 'a4');
        const pageW = doc.internal.pageSize.getWidth();
        const pageH = doc.internal.pageSize.getHeight();
        const margin = 15;

        // ----- COVER -----
        // Latar belakang gradasi ungu (2 kotak)
        doc.setFillColor(49, 46, 129); doc.rect(0, 0, pageW, pageH/2, 'F');
        doc.setFillColor(99, 102, 241); doc.rect(0, pageH/2, pageW, pageH/2, 'F');
        // Overlay transparan
        doc.setFillColor(255,255,255); doc.setGState(new doc.GState({opacity: 0.08}));
        doc.rect(0,0,pageW,pageH,'F'); doc.setGState(new doc.GState({opacity: 1}));

        // Logo
        let logoY = 40;
        if (logoB64) {
          doc.addImage(logoB64, 'PNG', (pageW-60)/2, logoY, 60, 60);
          logoY += 70;
        } else { logoY += 30; }

        // Teks BUMA
        doc.setFontSize(32); doc.setTextColor(255,255,255); doc.setFont(undefined,'bold');
        doc.text('BUMA', pageW/2, logoY, { align: 'center' });
        doc.setFontSize(14); doc.setFont(undefined,'normal');
        doc.text('Badan Usaha Milik Ansor', pageW/2, logoY+10, { align: 'center' });
        doc.text('Kabupaten Bantul', pageW/2, logoY+18, { align: 'center' });

        // Aksen garis emas
        doc.setDrawColor(255,215,0); doc.setLineWidth(1.5);
        doc.line(pageW/2-40, logoY+25, pageW/2+40, logoY+25);

        doc.setFontSize(24); doc.setTextColor(255,255,255);
        doc.text('KATALOG USAHA', pageW/2, logoY+40, { align: 'center' });

        doc.setFontSize(12); doc.setTextColor(230,230,230);
        doc.text(`Tahun ${new Date().getFullYear()}  •  ${new Date().toLocaleDateString('id-ID')}`, pageW/2, logoY+52, { align: 'center' });

        doc.setFontSize(9); doc.setTextColor(200,200,200);
        doc.text('bumabantul@gmail.com  |  (0274) 123456', pageW/2, 255, { align: 'center' });

        // ----- HALAMAN ISI -----
        const itemsPerPage = 4;
        const totalPages = Math.ceil(data.length / itemsPerPage);
        for (let h = 1; h <= totalPages; h++) {
          if (h > 1) doc.addPage();
          else doc.addPage();
          let y = margin, nomor = (h-1)*itemsPerPage + 1;
          for (let i = (h-1)*itemsPerPage; i < Math.min(data.length, h*itemsPerPage); i++) {
            const item = data[i];
            // Latar selang-seling
            if (i%2===0) { doc.setFillColor(248,249,255); doc.rect(margin-5, y-3, pageW-2*margin+10, 50, 'F'); }

            // Nomor (angka besar ungu + garis bawah)
            doc.setFontSize(26); doc.setTextColor(99,102,241); doc.setFont(undefined,'bold');
            doc.text(`${nomor}`, margin, y+18, { baseline: 'middle' });
            doc.setDrawColor(99,102,241); doc.setLineWidth(0.8);
            doc.line(margin, y+23, margin+14, y+23);

            // Foto
            const imgX = margin+18, imgY = y+5, imgW = 28, imgH = 28;
            doc.setDrawColor(210); doc.setFillColor(240,240,245);
            doc.rect(imgX, imgY, imgW, imgH, 'FD');
            const fotoSrc = item.foto?.startsWith('data:') ? item.foto : fotoCache.get(item.foto);
            if (fotoSrc) { try { doc.addImage(fotoSrc, 'JPEG', imgX, imgY, imgW, imgH); } catch(e) {} }

            // Info teks
            const tx = imgX+imgW+8;
            doc.setFontSize(10); doc.setTextColor(15,23,42); doc.setFont(undefined,'bold');
            doc.text(item.namaUsaha, tx, y+8);
            doc.setFontSize(8); doc.setFont(undefined,'normal'); doc.setTextColor(70);
            doc.text(`Pemilik: ${item.pemilik}  |  PAC: ${item.asalPac||'-'}`, tx, y+14);
            doc.text(`Jenis: ${item.jenisUsaha}  |  Telp: ${item.telepon||'-'}`, tx, y+20);
            doc.text(`Alamat: ${item.alamat}`, tx, y+26);
            if (item.deskripsi) {
              const descLines = doc.splitTextToSize(item.deskripsi, pageW - tx - margin);
              doc.text(descLines.slice(0,2), tx, y+32);
            }

            y += 50;
            nomor++;
          }
          // Nomor halaman bawah
          doc.setFontSize(8); doc.setTextColor(150);
          doc.text(`— ${h} —`, pageW/2, pageH-10, { align: 'center' });
        }

        doc.save(`Katalog_Usaha_BUMA_${new Date().toISOString().slice(0,10)}.pdf`);
      }

      window.exportKatalogPDF = async function() {
        const exportData = filteredDataUsaha.length > 0 ? filteredDataUsaha : currentDataUsaha;
        if (exportData.length === 0) return alert('Tidak ada data untuk katalog.');
        const overlay = document.createElement('div'); overlay.className = 'pdf-progress-overlay';
        overlay.innerHTML = '<div class="pdf-progress-content"><div class="spinner-border text-primary mb-3" style="width:3rem;height:3rem;"></div><p class="fw-semibold">Menyusun katalog profesional...</p></div>';
        document.body.appendChild(overlay);
        try {
          await loadJSPDF();
          await generateKatalogPDF(exportData);
        } catch(e) { alert('Gagal membuat katalog: ' + e.message); }
        finally { const ov = document.querySelector('.pdf-progress-overlay'); if (ov) ov.remove(); }
      };

      // ========== MODAL & PETA (LENGKAP) ==========
      window.viewUsaha = async function(id) {
        const res = await apiCall('getDataUsahaById', { token, id });
        if (!res.success) return alert('Data tidak ditemukan.');
        const item = res.data;
        const imgHtml = item.foto ? `<img src="${item.foto}" class="img-fluid rounded-3 mb-3" style="max-height:200px;" onerror="this.style.display='none'" alt="Foto">` : '<i class="bi bi-image text-muted" style="font-size:4rem;"></i>';
        document.getElementById('viewUsahaContent').innerHTML = `
          <div class="row">
            <div class="col-md-4 text-center">${imgHtml}</div>
            <div class="col-md-8">
              <h5>${item.namaUsaha}</h5>
              <p><strong>Pemilik:</strong> ${item.pemilik}</p>
              <p><strong>Asal PAC:</strong> ${item.asalPac||'-'}</p>
              <p><strong>Jenis:</strong> ${item.jenisUsaha}</p>
              <p><strong>Alamat:</strong> ${item.alamat}</p>
              <p><strong>Telepon:</strong> ${item.telepon||'-'}</p>
              <p><strong>Deskripsi:</strong> ${item.deskripsi||'-'}</p>
              <p><strong>Lokasi:</strong> ${item.lat||'-'}</p>
            </div>
          </div>`;
        new bootstrap.Modal(document.getElementById('viewUsahaModal')).show();
      };

      // Peta Edit
      let mapEditObj = null, markerEditObj = null;
      const defaultLat = -7.885, defaultLng = 110.363;
      let currentEditId = null;

      function initMapEdit(lat = defaultLat, lng = defaultLng) {
        if (mapEditObj) { mapEditObj.remove(); mapEditObj = null; }
        mapEditObj = L.map('mapEdit').setView([lat, lng], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(mapEditObj);
        markerEditObj = L.marker([lat, lng], { draggable: true }).addTo(mapEditObj);
        markerEditObj.on('moveend', () => {
          const p = markerEditObj.getLatLng();
          document.getElementById('editLat').value = p.lat.toFixed(6);
          document.getElementById('editLng').value = p.lng.toFixed(6);
        });
        mapEditObj.on('click', e => {
          markerEditObj.setLatLng(e.latlng);
          document.getElementById('editLat').value = e.latlng.lat.toFixed(6);
          document.getElementById('editLng').value = e.latlng.lng.toFixed(6);
        });
        document.getElementById('editLat').value = lat.toFixed(6);
        document.getElementById('editLng').value = lng.toFixed(6);
      }

      window.getCurrentLocationEdit = function() {
        if (!navigator.geolocation) return alert('Geolokasi tidak didukung.');
        navigator.geolocation.getCurrentPosition(pos => {
          mapEditObj.setView([pos.coords.latitude, pos.coords.longitude], 15);
          markerEditObj.setLatLng([pos.coords.latitude, pos.coords.longitude]);
          document.getElementById('editLat').value = pos.coords.latitude.toFixed(6);
          document.getElementById('editLng').value = pos.coords.longitude.toFixed(6);
        }, () => alert('Gagal mengambil lokasi.'));
      };

      window.tambahUsaha = function() {
        currentEditId = null;
        document.getElementById('editUsahaTitle').innerText = 'Tambah Usaha';
        document.getElementById('editUsahaForm').reset();
        document.getElementById('editId').value = '';
        const modalEl = document.getElementById('editUsahaModal');
        const modal = new bootstrap.Modal(modalEl);
        modal.show();
        const onShown = () => {
          initMapEdit();
          mapEditObj.invalidateSize();
          modalEl.removeEventListener('shown.bs.modal', onShown);
        };
        modalEl.addEventListener('shown.bs.modal', onShown);
      };

      window.editUsaha = async function(id) {
        const res = await apiCall('getDataUsahaById', { token, id });
        if (!res.success) return alert('Data tidak ditemukan.');
        const item = res.data;
        currentEditId = id;
        document.getElementById('editUsahaTitle').innerText = 'Edit Usaha';
        document.getElementById('editId').value = item.id;
        document.getElementById('editNamaUsaha').value = item.namaUsaha || '';
        document.getElementById('editPemilik').value = item.pemilik || '';
        document.getElementById('editAsalPac').value = item.asalPac || '';
        document.getElementById('editJenisUsaha').value = item.jenisUsaha || '';
        document.getElementById('editAlamat').value = item.alamat || '';
        document.getElementById('editTelepon').value = item.telepon || '';
        document.getElementById('editFoto').value = item.foto || '';
        document.getElementById('editDeskripsi').value = item.deskripsi || '';

        // Koordinat
        let lat = defaultLat, lng = defaultLng;
        const latRaw = String(item.lat || '');
        if (latRaw.includes('Latitude')) {
          const m = latRaw.match(/Latitude:\s*(-?\d+\.?\d*)/i), n = latRaw.match(/Longitude:\s*(-?\d+\.?\d*)/i);
          if (m && n) { lat = parseFloat(m[1]); lng = parseFloat(n[1]); }
        } else if (item.lat && !isNaN(parseFloat(item.lat))) {
          lat = parseFloat(item.lat);
          lng = item.lng && !isNaN(parseFloat(item.lng)) ? parseFloat(item.lng) : defaultLng;
        }

        const modalEl = document.getElementById('editUsahaModal');
        const modal = new bootstrap.Modal(modalEl);
        modal.show();
        const onShown = () => {
          initMapEdit(lat, lng);
          mapEditObj.invalidateSize();
          modalEl.removeEventListener('shown.bs.modal', onShown);
        };
        modalEl.addEventListener('shown.bs.modal', onShown);
      };

      window.simpanUsaha = async function(e) {
        e.preventDefault();
        const id = document.getElementById('editId').value;
        const data = {
          token,
          namaUsaha: document.getElementById('editNamaUsaha').value,
          pemilik: document.getElementById('editPemilik').value,
          asalPac: document.getElementById('editAsalPac').value,
          jenisUsaha: document.getElementById('editJenisUsaha').value,
          alamat: document.getElementById('editAlamat').value,
          telepon: document.getElementById('editTelepon').value,
          deskripsi: document.getElementById('editDeskripsi').value,
          foto: document.getElementById('editFoto').value,
          lat: document.getElementById('editLat').value,
          lng: document.getElementById('editLng').value
        };
        if (id) data.id = id;
        try {
          const path = id ? 'updateDataUsaha' : 'addDataUsaha';
          const res = await apiCall(path, data);
          if (res.success) {
            alert('Data tersimpan.');
            bootstrap.Modal.getInstance(document.getElementById('editUsahaModal')).hide();
            await loadData(true);
          } else { alert('Gagal: ' + res.message); }
        } catch(err) { alert('Error: ' + err.message); }
      };

      // Bersihkan peta setelah modal ditutup
      document.getElementById('editUsahaModal').addEventListener('hidden.bs.modal', () => {
        if (mapEditObj) { mapEditObj.remove(); mapEditObj = null; }
      });

      // Event pencarian
      document.getElementById('searchInput').addEventListener('keyup', applyFilter);

      // Background refresh
      setTimeout(() => {
        if (!document.hidden) loadData();
        setInterval(() => { if (!document.hidden) loadData(); }, 30000);
      }, 30000);
    })();
  </script>
</body>
</html>
