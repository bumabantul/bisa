<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>Pengaturan - BUMA Admin</title>
  <link rel="icon" type="image/webp" href="../assets/logo buma.webp">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #6366f1; --primary-dark: #4f46e5; --secondary: #8b5cf6; --accent: #06b6d4;
      --dark: #0f172a; --light: #f8fafc; --card-bg: #ffffff; --glass-bg: rgba(255,255,255,0.75);
      --text: #1e293b; --text-muted: #64748b; --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
      --shadow: 0 4px 6px rgba(0,0,0,0.05); --shadow-lg: 0 20px 40px rgba(0,0,0,0.08);
      --radius: 20px; --transition: 0.3s;
    }
    * { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent; padding: 0; overflow-y: auto; }
    #sidebar, #sidebarOverlay, #sidebarToggleBtn { display: none; }
    .navbar { display: none; }
    .main-content { padding: 0; }
    .card {
      border: 1px solid rgba(0,0,0,0.04); border-radius: var(--radius); box-shadow: var(--shadow-lg);
      margin-bottom: 25px; background: white;
    }
    .card-header {
      background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #fff;
      font-weight: 600; padding: 18px 25px; border-radius: var(--radius) var(--radius) 0 0 !important;
    }
    .btn-primary { background: linear-gradient(135deg, var(--primary), var(--secondary)); border: none; border-radius: 50px; padding: 10px 20px; font-weight: 600; color: #fff; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(99,102,241,0.4); }
    .form-control { border-radius: 14px; padding: 12px 18px; border: 2px solid #e8ecf1; transition: var(--transition); font-size: 0.95rem; background: #fafbfc; }
    .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(99,102,241,0.08); background: #fff; }
  </style>
</head>
<body>
  <div class="main-content">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="card">
          <div class="card-header"><i class="bi bi-lock"></i> Ubah Password</div>
          <div class="card-body">
            <form id="changePasswordForm" onsubmit="ubahPassword(event)">
              <div class="mb-3"><label class="form-label">Password Lama</label><input type="password" class="form-control" id="oldPassword" required></div>
              <div class="mb-3"><label class="form-label">Password Baru</label><input type="password" class="form-control" id="newPassword" required></div>
              <div class="mb-3"><label class="form-label">Konfirmasi Password Baru</label><input type="password" class="form-control" id="confirmPassword" required></div>
              <button type="submit" class="btn btn-primary">Simpan Password Baru</button>
            </form>
          </div>
        </div>

        <div class="card">
          <div class="card-header"><i class="bi bi-tools"></i> Data & Cadangan</div>
          <div class="card-body">
            <p class="text-muted">Cadangkan semua data ke file JSON atau reset seluruh data ke kondisi awal.</p>
            <div class="d-flex flex-wrap gap-2">
              <button class="btn btn-outline-secondary rounded-pill" onclick="backupSekarang()"><i class="bi bi-download me-1"></i> Backup JSON</button>
              <button class="btn btn-outline-danger rounded-pill" onclick="resetSemuaData()"><i class="bi bi-exclamation-triangle me-1"></i> Reset Data</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/api.js"></script>
  <script>
    (function() {
      // Token fallback: appStorage -> window.top._authToken
      const token = (typeof appStorage !== 'undefined' && appStorage.get('token')) || (window.top._authToken) || null;
      if (!token) { window.top.location.href = '../login.html'; return; }

      const role = (typeof appStorage !== 'undefined' && appStorage.get('role')) || (window.top._authRole) || null;
      if (role !== 'admin') { window.top.location.href = '../login.html'; return; }

      window.ubahPassword = async function(e) {
        e.preventDefault();
        const oldP = document.getElementById('oldPassword').value;
        const newP = document.getElementById('newPassword').value;
        const confirmP = document.getElementById('confirmPassword').value;
        if (newP !== confirmP) return alert('Password baru dan konfirmasi tidak cocok.');
        try {
          const res = await apiCall('changePassword', {
            token: token,
            oldPassword: oldP,
            newPassword: newP
          });
          if (res.success) {
            alert('Password berhasil diubah.');
            document.getElementById('changePasswordForm').reset();
          } else {
            alert('Gagal: ' + res.message);
          }
        } catch (err) {
          alert('Error: ' + err.message);
        }
      };

      window.backupSekarang = async function() {
        try {
          const res = await apiCall('backupData', { token: token });
          if (res.success && res.data) {
            const blob = new Blob([JSON.stringify(res.data, null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `buma_backup_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            alert('Backup berhasil diunduh.');
          } else {
            alert('Gagal backup: ' + (res.message || 'Data kosong.'));
          }
        } catch (err) {
          alert('Error: ' + err.message);
        }
      };

      window.resetSemuaData = async function() {
        if (!confirm('PERINGATAN!\n\nAnda akan menghapus SEMUA data usaha, pesan, dan artikel.\nTindakan ini TIDAK DAPAT DIBATALKAN.\n\nLanjutkan?')) return;
        try {
          const res = await apiCall('resetData', { token: token });
          if (res.success) { alert('Semua data telah direset.'); }
          else alert('Gagal reset: ' + res.message);
        } catch (err) { alert('Error: ' + err.message); }
      };
    })();
  </script>
</body>
</html>
