<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>Tambah/Edit Usaha - BUMA Member</title>
  <link rel="icon" type="image/webp" href="../assets/logo buma.webp">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #6366f1; --primary-dark: #4f46e5; --secondary: #8b5cf6; --accent: #06b6d4;
      --dark: #0f172a; --light: #f8fafc; --card-bg: #ffffff; --glass-bg: rgba(255,255,255,0.75);
      --text: #1e293b; --text-muted: #64748b; --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
      --shadow: 0 4px 6px rgba(0,0,0,0.05); --shadow-lg: 0 20px 40px rgba(0,0,0,0.08);
      --radius: 20px; --transition: 0.3s;
    }
    * { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--light); color: var(--text); padding-bottom: 2rem; }
    .navbar {
      background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.4);
      box-shadow: var(--shadow-sm); border-radius: var(--radius); margin: 20px 20px 25px 20px; padding: 15px 25px;
    }
    .navbar-brand { font-weight: 700; color: var(--dark) !important; display: flex; align-items: center; gap: 10px; font-size: 1rem; text-decoration: none; }
    .navbar-brand img { height: 42px; border-radius: 10px; }
    .form-card {
      background: var(--card-bg); border: 1px solid rgba(0,0,0,0.04); border-radius: 28px;
      box-shadow: var(--shadow-lg); overflow: hidden; max-width: 800px; margin: 0 auto;
    }
    .form-card .card-header {
      background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #fff;
      padding: 1.5rem; border-bottom: none; font-weight: 700; font-size: 1.3rem;
    }
    .form-card .card-body { padding: 2rem; }
    .form-label { font-weight: 600; color: var(--text); }
    .form-control, .form-select {
      border-radius: 14px; padding: 12px 18px; border: 2px solid #e8ecf1;
      transition: var(--transition); font-size: 0.95rem; background: #fafbfc;
    }
    .form-control:focus, .form-select:focus {
      border-color: var(--primary); box-shadow: 0 0 0 4px rgba(99,102,241,0.08); background: #fff;
    }
    textarea.form-control { border-radius: 14px; }
    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--secondary)); border: none;
      border-radius: 50px; padding: 12px 28px; font-weight: 700; transition: var(--transition);
      box-shadow: 0 6px 18px rgba(99,102,241,0.3); color: #fff; font-size: 1rem;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(99,102,241,0.4); }
    .btn-outline-secondary { border-radius: 50px; }
    #map { height: 350px; border-radius: var(--radius); border: 2px solid #e8ecf1; margin-bottom: 15px; box-shadow: var(--shadow); z-index: 0; }
    .photo-preview { max-width: 200px; max-height: 200px; margin-top: 10px; border-radius: 12px; border: 2px solid #e8ecf1; padding: 5px; }
    .alert { border-radius: var(--radius); }
    @media (max-width: 768px) {
      .navbar { margin: 10px; padding: 10px 15px; }
      .form-card .card-body { padding: 1.5rem; }
      #map { height: 250px; }
    }
    @media (max-width: 576px) {
      .form-card .card-body { padding: 1rem; }
      #map { height: 200px; }
    }
  </style>
</head>
<body>
  <!-- Navbar Member -->
  <nav class="navbar navbar-expand">
    <div class="container-fluid">
      <a class="navbar-brand" href="dashboard-member.html">
        <img src="../assets/logo buma.webp" alt="BUMA Bantul" height="40">
        <span><strong>BUMA</strong> Member</span>
      </a>
      <div class="ms-auto d-flex align-items-center gap-2">
        <a href="dashboard-member.html" class="btn btn-outline-secondary btn-sm rounded-pill"><i class="bi bi-arrow-left me-1"></i>Kembali</a>
        <div class="dropdown">
          <button class="btn btn-outline-secondary dropdown-toggle rounded-pill btn-sm" type="button" data-bs-toggle="dropdown">
            <i class="bi bi-person-circle"></i> <span id="userDisplay">Member</span>
          </button>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" href="../index.html">Beranda</a></li>
            <li><a class="dropdown-item" href="#" onclick="logout()">Logout</a></li>
          </ul>
        </div>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="form-card">
      <div class="card-header text-center" id="formTitle">
        <i class="bi bi-building me-2"></i> <span id="titleText">Tambah Usaha</span>
      </div>
      <div class="card-body">
        <div id="alertMessage" class="alert d-none"></div>
        <form id="usahaForm">
          <input type="hidden" id="editId">
          <div class="mb-3"><label class="form-label">Nama Usaha <span class="text-danger">*</span></label><input type="text" class="form-control" id="namaUsaha" placeholder="Nama usaha Anda" required></div>
          <div class="mb-3"><label class="form-label">Nama Pemilik <span class="text-danger">*</span></label><input type="text" class="form-control" id="pemilik" placeholder="Nama lengkap pemilik" required></div>
          <div class="mb-3"><label class="form-label">Asal PAC GP Ansor <span class="text-danger">*</span></label>
            <select class="form-select" id="asalPac" required>
              <option value="">Pilih Kapanewon</option>
              <option>Bambanglipuro</option><option>Banguntapan</option><option>Bantul</option>
              <option>Dlingo</option><option>Imogiri</option><option>Jetis</option>
              <option>Kasihan</option><option>Kretek</option><option>Pajangan</option>
              <option>Pandak</option><option>Piyungan</option><option>Pleret</option>
              <option>Pundong</option><option>Sanden</option><option>Sedayu</option>
              <option>Sewon</option><option>Srandakan</option>
            </select>
          </div>
          <div class="mb-3"><label class="form-label">Jenis Usaha <span class="text-danger">*</span></label>
            <select class="form-select" id="jenisUsaha" required>
              <option value="">Pilih jenis usaha</option>
              <option value="Toko Sembako">Toko Sembako</option>
              <option value="Kuliner">Kuliner</option>
              <option value="Peternakan">Peternakan</option>
              <option value="Pertanian">Pertanian</option>
              <option value="Kerajinan">Kerajinan</option>
              <option value="Jasa">Jasa</option>
              <option value="Bengkel">Bengkel</option>
              <option value="Lainnya">Lainnya</option>
            </select>
            <div id="customJenisContainer" style="display:none;">
              <input type="text" class="form-control mt-2" id="customJenis" placeholder="Sebutkan jenis usaha Anda">
            </div>
          </div>
          <div class="mb-3"><label class="form-label">Alamat Lengkap <span class="text-danger">*</span></label><textarea class="form-control" id="alamat" rows="2" placeholder="Alamat usaha Anda" required></textarea></div>
          <div class="mb-3"><label class="form-label">Telepon/WhatsApp <span class="text-danger">*</span></label><input type="tel" class="form-control" id="telepon" placeholder="Nomor yang bisa dihubungi" required></div>
          <div class="mb-3"><label class="form-label">Deskripsi Usaha <span class="text-danger">*</span></label><textarea class="form-control" id="deskripsi" rows="3" placeholder="Jelaskan tentang produk, layanan, atau keunggulan usaha Anda" required></textarea></div>
          <div class="mb-3"><label class="form-label">Foto Usaha <small class="text-muted">(opsional)</small></label>
            <input type="file" class="form-control" id="fotoInput" accept="image/*">
            <div id="photoPreviewContainer" style="display:none;" class="mt-2">
              <img id="photoPreview" class="photo-preview" src="#">
              <button type="button" class="btn btn-sm btn-danger rounded-pill mt-2" id="removePhoto"><i class="bi bi-trash me-1"></i>Hapus</button>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Lokasi Usaha <span class="text-danger">*</span></label>
            <button type="button" class="btn btn-outline-primary current-location-btn btn-sm rounded-pill mb-2" id="getLocationBtn"><i class="bi bi-crosshair"></i> Dapatkan Lokasi Saya</button>
            <div id="map"></div>
            <input type="text" class="form-control mt-2" id="lokasiUsaha" placeholder="Klik peta atau gunakan tombol di atas" required>
            <small class="text-muted">Lokasi lebih akurat bisa digeser manual</small>
          </div>
          <hr>
          <div class="alert alert-info d-flex align-items-center gap-2"><i class="bi bi-shield-lock fs-5"></i><span>Data Anda aman dan hanya digunakan untuk pemetaan ekonomi anggota Ansor Kabupaten Bantul.</span></div>
          <div class="d-grid gap-2 mt-4">
            <button type="submit" class="btn btn-primary btn-lg" id="simpanBtn"><i class="bi bi-cloud-upload me-2"></i> <span id="btnText">Simpan Data Usaha</span></button>
            <button type="button" class="btn btn-outline-secondary" id="resetBtn"><i class="bi bi-arrow-counterclockwise me-1"></i>Reset Form</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    (function() {
      // Auth
      const token = (typeof appStorage !== 'undefined' && appStorage.get('token')) || (window._authToken) || null;
      const role = (typeof appStorage !== 'undefined' && appStorage.get('role')) || (window._authRole) || null;
      if (!token || role !== 'member') {
        window.location.href = '../login.html';
        return;
      }

      document.getElementById('userDisplay').innerText = (typeof appStorage !== 'undefined') ? (appStorage.get('nama') || 'Member') : 'Member';

      // Map
      const defaultLat = -7.885, defaultLng = 110.363;
      let map, marker;

      function initMap(lat = defaultLat, lng = defaultLng) {
        if (map) map.remove();
        map = L.map('map').setView([lat, lng], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          maxZoom: 19,
          attribution: '© OpenStreetMap contributors'
        }).addTo(map);
        marker = L.marker([lat, lng], { draggable: true }).addTo(map);
        updateMapInput(lat, lng);

        map.on('click', function(e) {
          marker.setLatLng(e.latlng);
          updateMapInput(e.latlng.lat, e.latlng.lng);
        });
        marker.on('dragend', function(e) {
          const { lat, lng } = e.target.getLatLng();
          updateMapInput(lat, lng);
        });
        setTimeout(() => map.invalidateSize(), 100);
      }

      function updateMapInput(lat, lng) {
        const latFull = lat.toLocaleString('fullwide', { useGrouping: false });
        const lngFull = lng.toLocaleString('fullwide', { useGrouping: false });
        document.getElementById('lokasiUsaha').value = `Latitude: ${latFull}, Longitude: ${lngFull}`;
      }

      document.getElementById('getLocationBtn').addEventListener('click', function() {
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(
            function(position) {
              const lat = position.coords.latitude;
              const lng = position.coords.longitude;
              map.setView([lat, lng], 15);
              marker.setLatLng([lat, lng]);
              updateMapInput(lat, lng);
            },
            function(error) { alert('Tidak dapat mengambil lokasi: ' + error.message); },
            { enableHighAccuracy: true }
          );
        } else { alert('Browser tidak mendukung geolokasi.'); }
      });

      // Preview foto
      document.getElementById('fotoInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = function(event) {
            document.getElementById('photoPreview').src = event.target.result;
            document.getElementById('photoPreviewContainer').style.display = 'block';
          };
          reader.readAsDataURL(file);
        }
      });

      document.getElementById('removePhoto').addEventListener('click', function() {
        document.getElementById('fotoInput').value = '';
        document.getElementById('photoPreviewContainer').style.display = 'none';
        document.getElementById('photoPreview').src = '#';
      });

      // Jenis usaha lainnya
      const jenisSelect = document.getElementById('jenisUsaha');
      const customContainer = document.getElementById('customJenisContainer');
      const customInput = document.getElementById('customJenis');
      jenisSelect.addEventListener('change', function() {
        if (this.value === 'Lainnya') {
          customContainer.style.display = 'block';
          customInput.setAttribute('required', true);
        } else {
          customContainer.style.display = 'none';
          customInput.removeAttribute('required');
          customInput.value = '';
        }
      });

      // Reset form
      document.getElementById('resetBtn').addEventListener('click', function() {
        document.getElementById('usahaForm').reset();
        document.getElementById('photoPreviewContainer').style.display = 'none';
        customContainer.style.display = 'none';
        customInput.removeAttribute('required');
        initMap(defaultLat, defaultLng);
      });

      // ======================== MODE EDIT ========================
      const urlParams = new URLSearchParams(window.location.search);
      const editId = urlParams.get('edit');

      async function loadEditData(id) {
        try {
          const res = await apiCall('getDataUsahaById', { token, id });
          if (res.success) {
            const item = res.data;
            document.getElementById('editId').value = item.id;
            document.getElementById('namaUsaha').value = item.namaUsaha || '';
            document.getElementById('pemilik').value = item.pemilik || '';
            document.getElementById('asalPac').value = item.asalPac || '';
            document.getElementById('jenisUsaha').value = item.jenisUsaha || '';
            document.getElementById('alamat').value = item.alamat || '';
            document.getElementById('telepon').value = item.telepon || '';
            document.getElementById('deskripsi').value = item.deskripsi || '';
            document.getElementById('lokasiUsaha').value = item.lat || '';

            // Cek apakah jenisUsaha termasuk dalam opsi, jika tidak tampilkan custom
            const jenisOpts = Array.from(document.getElementById('jenisUsaha').options).map(o => o.value);
            if (!jenisOpts.includes(item.jenisUsaha) && item.jenisUsaha) {
              document.getElementById('jenisUsaha').value = 'Lainnya';
              customContainer.style.display = 'block';
              customInput.value = item.jenisUsaha;
              customInput.setAttribute('required', true);
            }

            // Parse koordinat dari string lat
            let lat = defaultLat, lng = defaultLng;
            const latRaw = String(item.lat || '');
            if (latRaw.includes('Latitude')) {
              const m = latRaw.match(/Latitude:\s*(-?\d+\.?\d*)/i);
              const n = latRaw.match(/Longitude:\s*(-?\d+\.?\d*)/i);
              if (m && n) { lat = parseFloat(m[1]); lng = parseFloat(n[1]); }
            } else if (item.lat && !isNaN(parseFloat(item.lat))) {
              lat = parseFloat(item.lat);
              lng = item.lng && !isNaN(parseFloat(item.lng)) ? parseFloat(item.lng) : defaultLng;
            }

            // Update judul form
            document.getElementById('titleText').innerText = 'Edit Usaha';
            document.getElementById('btnText').innerText = 'Perbarui Data Usaha';

            // Init map dengan koordinat
            initMap(lat, lng);
          } else {
            showAlert('danger', 'Gagal memuat data: ' + res.message);
          }
        } catch (err) {
          showAlert('danger', 'Error: ' + err.message);
        }
      }

      if (editId) {
        loadEditData(editId);
      } else {
        initMap();
      }

      // ======================== SUBMIT FORM ========================
      document.getElementById('usahaForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        if (!document.getElementById('lokasiUsaha').value) {
          showAlert('danger', 'Lokasi usaha harus dipilih pada peta atau diketik manual.');
          return;
        }

        let jenisUsaha = document.getElementById('jenisUsaha').value;
        if (jenisUsaha === 'Lainnya') {
          const customJenis = document.getElementById('customJenis').value.trim();
          if (!customJenis) {
            showAlert('danger', 'Harap isi jenis usaha Anda.');
            return;
          }
          jenisUsaha = customJenis;
        }

        const fotoInput = document.getElementById('fotoInput');
        let fotoBase64 = '';
        if (fotoInput.files.length > 0) {
          fotoBase64 = await toBase64(fotoInput.files[0]);
        }

        const dataUsaha = {
          token: token,
          namaUsaha: document.getElementById('namaUsaha').value,
          pemilik: document.getElementById('pemilik').value,
          asalPac: document.getElementById('asalPac').value,
          jenisUsaha: jenisUsaha,
          alamat: document.getElementById('alamat').value,
          telepon: document.getElementById('telepon').value,
          deskripsi: document.getElementById('deskripsi').value,
          lokasiMap: document.getElementById('lokasiUsaha').value,
          foto: fotoBase64
        };

        const currentEditId = document.getElementById('editId').value;
        if (currentEditId) {
          dataUsaha.id = currentEditId;
        }

        const submitBtn = document.getElementById('simpanBtn');
        const originalHTML = submitBtn.innerHTML;
        submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Menyimpan...';
        submitBtn.disabled = true;

        try {
          const path = currentEditId ? 'updateDataUsaha' : 'addDataUsaha';
          const res = await apiCall(path, dataUsaha);
          if (res.success) {
            showAlert('success', currentEditId ? 'Data berhasil diperbarui!' : 'Data berhasil disimpan!');
            if (!currentEditId) {
              document.getElementById('usahaForm').reset();
              document.getElementById('photoPreviewContainer').style.display = 'none';
              customContainer.style.display = 'none';
              customInput.removeAttribute('required');
              document.getElementById('editId').value = '';
              initMap(defaultLat, defaultLng);
            }
          } else {
            showAlert('danger', 'Gagal: ' + (res.message || 'Terjadi kesalahan'));
          }
        } catch (err) {
          showAlert('danger', 'Error: ' + err.message);
        } finally {
          submitBtn.innerHTML = originalHTML;
          submitBtn.disabled = false;
        }
      });

      function toBase64(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.readAsDataURL(file);
          reader.onload = () => resolve(reader.result);
          reader.onerror = error => reject(error);
        });
      }

      function showAlert(type, message) {
        const alertDiv = document.getElementById('alertMessage');
        alertDiv.className = `alert alert-${type}`;
        alertDiv.innerHTML = message;
        alertDiv.classList.remove('d-none');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        setTimeout(() => alertDiv.classList.add('d-none'), 6000);
      }
    })();
  </script>
</body>
</html>
