<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>Mempersiapkan Dashboard - BUMA Member</title>
  <link rel="icon" type="image/webp" href="../assets/logo buma.webp">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #6366f1; --secondary: #8b5cf6; }
    * { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(160deg, #1e1b4b 0%, #312e81 40%, #4338ca 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 1.5rem;
    }
    .loading-container { text-align: center; color: #fff; }
    .spinner {
      width: 56px; height: 56px; margin: 0 auto 20px; border-radius: 50%;
      background: rgba(255,255,255,0.25);
      animation: pulse 1.2s infinite cubic-bezier(0.4, 0, 0.2, 1);
    }
    @keyframes pulse {
      0% { transform: scale(0.8); opacity: 0.6; }
      50% { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(0.8); opacity: 0.6; }
    }
    h4 { font-weight: 700; letter-spacing: -0.3px; }
    p { opacity: 0.8; font-size: 0.95rem; }
    .progress {
      height: 6px; background: rgba(255,255,255,0.2);
      border-radius: 10px; overflow: hidden; margin: 0 auto 20px; max-width: 300px;
    }
    .progress-bar {
      height: 100%; background: linear-gradient(90deg, var(--primary), var(--secondary));
      border-radius: 10px; width: 0%; animation: progressAnim 2s infinite ease-in-out;
    }
    @keyframes progressAnim {
      0% { width: 0%; } 50% { width: 70%; } 100% { width: 100%; }
    }
    .btn-skip {
      color: rgba(255,255,255,0.7); text-decoration: underline; cursor: pointer;
      background: none; border: none; font-weight: 500; margin-top: 20px;
    }
    .btn-skip:hover { color: #fff; }
  </style>
</head>
<body>
  <div class="loading-container">
    <div class="spinner"></div>
    <h4>Mempersiapkan Dashboard</h4>
    <p>Mengambil data usaha terbaru...</p>
    <div class="progress"><div class="progress-bar"></div></div>
    <button class="btn-skip" onclick="skipAndGo()">Lewati, langsung ke Dashboard</button>
  </div>

  <script src="../js/api.js"></script>
  <script>
    (async function() {
      const token = (typeof appStorage !== 'undefined') ? appStorage.get('token') : null;
      const role  = (typeof appStorage !== 'undefined') ? appStorage.get('role') : null;
      if (!token || role !== 'member') {
        window.location.href = '../login.html';
        return;
      }

      try {
        const res = await apiCall('getDataUsaha', { token });
        const usaha = res.success ? res.data : [];

        // Simpan ke appStorage / fallback
        let cacheOk = true;
        try {
          if (typeof appStorage !== 'undefined') {
            appStorage.set('member_usaha_cache', JSON.stringify(usaha));
            // verifikasi
            if (!appStorage.get('member_usaha_cache')) cacheOk = false;
          } else {
            cacheOk = false;
          }
        } catch (e) { cacheOk = false; }

        // Jika appStorage gagal, gunakan window.name
        if (!cacheOk) {
          window.name = JSON.stringify({ token, role, usaha });
        } else {
          window.name = '';
        }
      } catch (e) {
        console.warn('Preload member gagal, tetap lanjut.');
      }

      setTimeout(() => { window.location.href = 'dashboard-member.html'; }, 400);
    })();

    function skipAndGo() {
      window.location.href = 'dashboard-member.html';
    }
  </script>
</body>
</html>
