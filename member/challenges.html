<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>Challenge Quiz - BUMA Member</title>
  <link rel="icon" type="image/webp" href="../assets/logo buma.webp">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #6366f1; --primary-dark: #4f46e5; --secondary: #8b5cf6; --accent: #06b6d4;
      --dark: #0f172a; --light: #f8fafc; --text: #1e293b;
      --shadow: 0 4px 6px rgba(0,0,0,0.05); --shadow-lg: 0 20px 40px rgba(0,0,0,0.08);
      --radius: 20px; --transition: 0.3s;
    }
    * { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
    body { background: linear-gradient(135deg, #f5f7fa 0%, #eef0f5 100%); min-height: 100vh; }
    .navbar {
      background: rgba(255,255,255,0.85); backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.6); box-shadow: var(--shadow);
      border-radius: 0 0 var(--radius) var(--radius);
    }
    .container-main { padding: 2rem 1rem; }
    .level-card {
      background: white; border-radius: var(--radius); padding: 2rem 1rem; text-align: center;
      transition: var(--transition); box-shadow: var(--shadow); position: relative;
    }
    .level-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-lg); }
    .level-card.locked { opacity: 0.7; filter: grayscale(30%); }
    .level-card.completed { border: 2px solid #10b981; }
    .level-card .level-icon { font-size: 3rem; margin-bottom: 0.5rem; }
    .level-card .level-number { font-size: 1.8rem; font-weight: 800; margin-bottom: 0.3rem; }
    .btn-challenge { border-radius: 50px; padding: 8px 24px; font-weight: 600; }
    .quiz-modal .modal-header { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #fff; }
    .quiz-modal .btn-close { filter: brightness(0) invert(1); }
    .option-btn {
      display: block; width: 100%; margin-bottom: 8px; text-align: left;
      border-radius: 50px; border: 2px solid #e8ecf1; padding: 12px 20px;
      background: white; transition: var(--transition); font-weight: 500;
    }
    .option-btn:hover { border-color: var(--primary); background: rgba(99,102,241,0.04); }
    .option-btn.selected { border-color: var(--primary); background: rgba(99,102,241,0.1); }
    .feedback-correct { color: #10b981; }
    .feedback-wrong { color: #ef4444; }
    .unlock-text { color: var(--primary); font-weight: 600; margin-top: 1rem; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg py-3 px-3">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="dashboard-member.html">
        <i class="bi bi-arrow-left me-2"></i> Dashboard
      </a>
      <span class="navbar-text fw-semibold"><i class="bi bi-puzzle-fill me-1"></i> Challenge Quiz</span>
    </div>
  </nav>

  <div class="container-main container">
    <div class="text-center mb-5">
      <h2 class="fw-bold">Selesaikan 5 Level</h2>
      <p class="text-muted">Untuk membuka fitur <strong>Analisis Usaha</strong>. Jawab pertanyaan dengan benar di setiap level.</p>
    </div>

    <div class="row g-4 justify-content-center" id="levelContainer">
      <!-- Level cards akan di-render oleh JavaScript -->
    </div>

    <div class="text-center mt-5" id="unlockArea" style="display: none;">
      <div class="alert alert-success rounded-pill d-inline-block">
        <i class="bi bi-unlock-fill me-2"></i> Semua level selesai! Anda dapat mengakses <strong>Analisis Usaha</strong>.
      </div>
      <br>
      <a href="analisis-usaha.html" class="btn btn-primary btn-lg rounded-pill mt-3 px-5">
        <i class="bi bi-graph-up-arrow me-2"></i> Buka Analisis Usaha
      </a>
    </div>
  </div>

  <!-- Modal Quiz -->
  <div class="modal fade quiz-modal" id="quizModal" tabindex="-1" data-bs-backdrop="static" data-bs-keyboard="false">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0 shadow-lg">
        <div class="modal-header">
          <h5 class="modal-title fw-bold" id="quizTitle">Level 1</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" onclick="closeQuiz()"></button>
        </div>
        <div class="modal-body p-4">
          <p class="fw-semibold mb-3" id="questionText"></p>
          <div id="optionsContainer"></div>
          <div id="feedbackArea" class="mt-3 text-center"></div>
        </div>
        <div class="modal-footer border-0 pt-0">
          <button class="btn btn-outline-secondary rounded-pill" onclick="closeQuiz()">Keluar</button>
          <button class="btn btn-primary rounded-pill px-4" id="submitAnswerBtn" onclick="submitAnswer()">
            <i class="bi bi-check-circle me-1"></i> Jawab
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    // ==================== AUTH ====================
    if (typeof appStorage === 'undefined') {
      window.location.href = '../login.html';
    }
    const token = appStorage.get('token');
    const role = appStorage.get('role');
    if (!token || role !== 'member') {
      window.location.href = '../login.html';
    }

    let quizModal;
    let currentLevel = 0;
    let currentQuestion = null;
    let allLevelsComplete = false;
    let selectedOption = null;
    let isAnswering = false;

    document.addEventListener('DOMContentLoaded', () => {
      quizModal = new bootstrap.Modal(document.getElementById('quizModal'));
      loadLevels();
    });

    // ==================== LOAD LEVELS ====================
    async function loadLevels() {
      try {
        const res = await apiCall('getChallenges', { token });
        if (!res.success) {
          document.getElementById('levelContainer').innerHTML = '<p class="text-danger">Gagal memuat data challenge.</p>';
          return;
        }
        const { levels, questions } = res;
        renderLevels(levels, questions);
        checkAllComplete(levels);
      } catch (e) {
        console.error(e);
        alert('Error memuat challenge.');
      }
    }

    function renderLevels(levels, questions) {
      const container = document.getElementById('levelContainer');
      container.innerHTML = '';
      const icons = ['1-circle', '2-circle', '3-circle', '4-circle', '5-circle'];
      for (let lv = 1; lv <= 5; lv++) {
        const status = levels[lv] || 'locked';
        const hasQuestions = questions[lv] && questions[lv].length > 0;
        let statusText = '';
        let iconClass = '';
        let btnDisabled = false;
        let btnText = 'Mulai';
        let cardClass = '';

        if (status === 'completed') {
          iconClass = 'bi-check-circle-fill text-success';
          statusText = 'Selesai';
          btnText = 'Lihat';
          cardClass = 'completed';
        } else if (status === 'in_progress') {
          iconClass = 'bi-arrow-repeat text-warning';
          statusText = 'Sedang dikerjakan';
          btnText = 'Lanjutkan';
        } else if (status === 'available') {
          iconClass = 'bi-unlock-fill text-primary';
          statusText = 'Bisa dikerjakan';
        } else {
          iconClass = 'bi-lock-fill text-muted';
          statusText = 'Terkunci';
          btnDisabled = true;
          cardClass = 'locked';
        }

        container.innerHTML += `
          <div class="col-lg-4 col-md-6 col-sm-12">
            <div class="level-card ${cardClass}">
              <i class="bi ${iconClass} level-icon"></i>
              <div class="level-number">Level ${lv}</div>
              <p class="text-muted small">${statusText}</p>
              <button class="btn btn-outline-primary btn-challenge mt-2" ${btnDisabled ? 'disabled' : ''} onclick="startLevel(${lv})">${btnText}</button>
            </div>
          </div>`;
      }
    }

    function checkAllComplete(levels) {
      allLevelsComplete = [1,2,3,4,5].every(lv => levels[lv] === 'completed');
      document.getElementById('unlockArea').style.display = allLevelsComplete ? 'block' : 'none';
    }

    // ==================== START LEVEL ====================
    window.startLevel = async function(level) {
      // Panggil startLevel untuk mengubah status ke in_progress
      try {
        await apiCall('startLevel', { token, level });
      } catch(e) { console.warn('startLevel error:', e); }

      // Ambil soal terbaru
      const res = await apiCall('getChallenges', { token });
      if (!res.success) return alert('Gagal memuat soal.');
      const questions = res.questions[level];
      if (!questions || questions.length === 0) {
        alert('Belum ada soal untuk level ini.');
        return;
      }
      // Ambil soal pertama (bisa di-loop jika banyak, tapi kita asumsikan satu soal per level)
      currentQuestion = questions[0];
      currentLevel = level;
      document.getElementById('quizTitle').innerText = `Level ${level}`;
      document.getElementById('questionText').innerText = currentQuestion.question;
      const optContainer = document.getElementById('optionsContainer');
      optContainer.innerHTML = '';
      selectedOption = null;
      const labels = ['A', 'B', 'C', 'D'];
      currentQuestion.options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.type = 'button';
        btn.innerHTML = `<strong>${labels[i]}.</strong> ${opt}`;
        btn.addEventListener('click', () => selectOption(labels[i], btn));
        optContainer.appendChild(btn);
      });
      document.getElementById('feedbackArea').innerHTML = '';
      document.getElementById('submitAnswerBtn').disabled = false;
      quizModal.show();
    };

    function selectOption(value, btnEl) {
      selectedOption = value;
      document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
      btnEl.classList.add('selected');
    }

    // ==================== SUBMIT ANSWER ====================
    window.submitAnswer = async function() {
      if (!selectedOption) {
        alert('Pilih jawaban terlebih dahulu.');
        return;
      }
      if (isAnswering) return;
      isAnswering = true;
      document.getElementById('submitAnswerBtn').disabled = true;
      const fb = document.getElementById('feedbackArea');

      try {
        const res = await apiCall('submitAnswer', { token, level: currentLevel, answer: selectedOption });
        if (res.correct) {
          fb.innerHTML = '<div class="feedback-correct fw-bold fs-5"><i class="bi bi-check-circle-fill me-2"></i>Jawaban Benar!</div>';
          fb.innerHTML += '<p class="text-muted">Level selesai. Kembali ke daftar level...</p>';
          // delay lalu tutup modal dan refresh
          setTimeout(() => {
            quizModal.hide();
            isAnswering = false;
            loadLevels();
          }, 1500);
        } else {
          fb.innerHTML = '<div class="feedback-wrong fw-bold"><i class="bi bi-x-circle-fill me-2"></i>Jawaban Salah</div>';
          fb.innerHTML += '<p class="text-muted small">Coba lagi.</p>';
          isAnswering = false;
          document.getElementById('submitAnswerBtn').disabled = false;
        }
      } catch(e) {
        console.error(e);
        alert('Error mengirim jawaban.');
        isAnswering = false;
        document.getElementById('submitAnswerBtn').disabled = false;
      }
    };

    window.closeQuiz = function() {
      quizModal.hide();
      loadLevels(); // refresh status level
    };
  </script>
</body>
</html>
