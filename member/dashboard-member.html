<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Member Dashboard - BUMA Bantul</title>
    <link rel="icon" type="image/webp" href="../assets/logo buma.webp">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1; --primary-dark: #4f46e5; --secondary: #8b5cf6; --accent: #06b6d4;
            --dark: #0f172a; --light: #f8fafc; --card-bg: #ffffff; --glass-bg: rgba(255,255,255,0.75);
            --text: #1e293b; --text-muted: #64748b; --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
            --shadow: 0 4px 6px rgba(0,0,0,0.05); --shadow-lg: 0 20px 40px rgba(0,0,0,0.08);
            --radius: 20px; --transition: 0.3s; --sidebar-width: 260px;
        }
        * { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--light); overflow-x: hidden; }
        #sidebar {
            width: var(--sidebar-width); background: linear-gradient(180deg, #1e1b4b 0%, #312e81 100%);
            color: #fff; position: fixed; top: 0; left: 0; height: 100vh; z-index: 1000;
            box-shadow: var(--shadow-lg); display: flex; flex-direction: column;
        }
        #sidebar .sidebar-header { padding: 25px 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        #sidebar .sidebar-header h4 { font-weight: 700; font-size: 1.5rem; }
        #sidebar .sidebar-header p { color: rgba(255,255,255,0.6); font-size: 0.85rem; }
        #sidebar ul.nav { flex: 1; padding: 1rem 0; list-style: none; }
        #sidebar ul.nav li a {
            display: flex; align-items: center; padding: 12px 25px; color: rgba(255,255,255,0.7);
            text-decoration: none; font-weight: 500; transition: all 0.3s;
            border-left: 4px solid transparent; margin: 4px 10px; border-radius: 10px;
        }
        #sidebar ul.nav li a i { margin-right: 15px; width: 22px; font-size: 1.2rem; }
        #sidebar ul.nav li a:hover, #sidebar ul.nav li a.active {
            background: rgba(99,102,241,0.2); color: #fff; border-left-color: var(--primary);
        }
        #sidebar .sidebar-footer { padding: 1rem; border-top: 1px solid rgba(255,255,255,0.1); }
        #content { margin-left: var(--sidebar-width); padding: 20px; min-height: 100vh; transition: margin-left 0.3s ease; }
        @media (max-width: 768px) {
            #sidebar { display: none; }
            #content { margin-left: 0 !important; }
        }
        .navbar { background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.4);
            box-shadow: var(--shadow-sm); border-radius: var(--radius); margin-bottom: 25px; padding: 15px 25px;
        }
        .stat-card { background: white; border-radius: var(--radius); padding: 25px; transition: all 0.3s;
            border: 1px solid rgba(0,0,0,0.04); box-shadow: var(--shadow); text-align: center; }
        .stat-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(99,102,241,0.15); }
        .stat-icon { width: 70px; height: 70px; border-radius: 20px; display: flex; align-items: center; justify-content: center;
            font-size: 2.2rem; margin: 0 auto 15px; }
        .stat-icon.primary { background: #e0e7ff; color: var(--primary); }
        .stat-icon.success { background: #e0f2fe; color: #4cc9f0; }
        .stat-value { font-size: 2.2rem; font-weight: 700; color: var(--text); }
        .stat-label { color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; font-size: 0.9rem; }
        .card { border: 1px solid rgba(0,0,0,0.04); border-radius: var(--radius); box-shadow: var(--shadow-lg);
            margin-bottom: 25px; background: white; }
        .card-header { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #fff;
            font-weight: 600; padding: 15px 25px; border-radius: var(--radius) var(--radius) 0 0 !important; }
        .table { background: white; border-radius: 15px; overflow: hidden; }
        .table thead th { background: #f8fafc; font-weight: 600; text-transform: uppercase; }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--secondary)); border: none; border-radius: 50px; padding: 10px 20px; font-weight: 600; color: #fff; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(99,102,241,0.4); }
        .btn-outline-primary { border-radius: 50px; }
        .btn-outline-secondary { border-radius: 50px; }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <nav id="sidebar">
        <div class="sidebar-header">
            <h4>BUMA Member</h4>
            <p>Kabupaten Bantul</p>
        </div>
        <ul class="nav flex-column">
            <li><a href="dashboard-member.html" class="active"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
            <li><a href="data-usaha-member.html"><i class="bi bi-plus-circle"></i> Tambah Usaha</a></li>
            <li><a href="challenges.html"><i class="bi bi-puzzle"></i> Challenge Quiz</a></li>
            <li><a href="analisis-usaha.html"><i class="bi bi-graph-up"></i> Analisis Usaha</a></li>
            <li><a href="profile-member.html"><i class="bi bi-person-circle"></i> Profil</a></li>
            <li><a href="../index.html"><i class="bi bi-house-door"></i> Beranda</a></li>
        </ul>
        <div class="sidebar-footer">
            <a href="#" onclick="logout()" class="btn btn-outline-light w-100 rounded-pill"><i class="bi bi-box-arrow-right me-1"></i>Logout</a>
        </div>
    </nav>

    <!-- Konten Utama -->
    <div id="content">
        <nav class="navbar navbar-expand">
            <div class="container-fluid">
                <span class="navbar-brand fw-bold text-dark">Dashboard Member</span>
                <div class="ms-auto">
                    <div class="dropdown">
                        <button class="btn btn-outline-secondary dropdown-toggle rounded-pill" type="button" data-bs-toggle="dropdown">
                            <i class="bi bi-person-circle"></i> <span id="userDisplay">Member</span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="profile-member.html">Profil</a></li>
                            <li><a class="dropdown-item" href="../index.html">Beranda</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="#" onclick="logout()">Logout</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Statistik -->
        <div class="row g-4 mb-4">
            <div class="col-6 col-md-6">
                <div class="stat-card">
                    <div class="stat-icon primary"><i class="bi bi-shop"></i></div>
                    <div class="stat-value" id="totalUsaha">--</div>
                    <div class="stat-label">Total Usaha Saya</div>
                </div>
            </div>
            <div class="col-6 col-md-6">
                <div class="stat-card">
                    <div class="stat-icon success"><i class="bi bi-calendar-check"></i></div>
                    <div class="stat-value" id="terdaftarSejak">2026</div>
                    <div class="stat-label">Member Sejak</div>
                </div>
            </div>
        </div>

        <!-- Tabel Data Usaha -->
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span><i class="bi bi-shop"></i> Data Usaha Saya</span>
                <a href="data-usaha-member.html" class="btn btn-outline-light btn-sm rounded-pill"><i class="bi bi-plus-circle me-1"></i>Tambah Usaha</a>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover align-middle" id="myUsahaTable">
                        <thead><tr><th>Foto</th><th>Nama Usaha</th><th>Jenis</th><th>Alamat</th><th>Aksi</th></tr></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        (function() {
            const token = (typeof appStorage !== 'undefined' && appStorage.get('token')) || (window.top._authToken) || null;
            const role = (typeof appStorage !== 'undefined' && appStorage.get('role')) || (window.top._authRole) || null;

            if (!token || role !== 'member') {
                window.location.href = '../login.html';
                return;
            }

            document.getElementById('userDisplay').innerText = (typeof appStorage !== 'undefined') ? (appStorage.get('nama') || 'Member') : 'Member';
            document.getElementById('terdaftarSejak').innerText = '2026'; // statis, bisa diganti dari data user

            let usahaSaya = [];
            const CACHE_KEY = 'member_usaha_cache';

            function saveCache(data) {
                if (typeof appStorage !== 'undefined') appStorage.set(CACHE_KEY, JSON.stringify(data));
                else sessionStorage.setItem(CACHE_KEY, JSON.stringify(data));
            }
            function loadCache() {
                if (typeof appStorage !== 'undefined') {
                    const raw = appStorage.get(CACHE_KEY);
                    return raw ? JSON.parse(raw) : null;
                }
                const raw = sessionStorage.getItem(CACHE_KEY);
                return raw ? JSON.parse(raw) : null;
            }

            // Render dari cache jika ada
            (function renderFromCache() {
                const cached = loadCache();
                if (cached) {
                    usahaSaya = cached;
                    renderTable();
                    updateStat();
                }
            })();

            async function fetchData() {
                try {
                    const res = await apiCall('getDataUsaha', { token });
                    if (res.success) {
                        usahaSaya = res.data;
                        saveCache(usahaSaya);
                        renderTable();
                        updateStat();
                    }
                } catch(e) { console.error(e); }
            }

            function updateStat() {
                document.getElementById('totalUsaha').innerText = usahaSaya.length;
            }

            function renderTable() {
                const tbody = document.querySelector('#myUsahaTable tbody');
                tbody.innerHTML = '';
                usahaSaya.forEach(item => {
                    const fotoHtml = item.foto
                        ? `<img src="${item.foto}" class="foto-thumb" style="width:50px;height:50px;object-fit:cover;border-radius:12px;" onerror="this.style.display='none'" alt="">`
                        : '<span class="text-muted">-</span>';
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${fotoHtml}</td>
                        <td><strong>${item.namaUsaha}</strong></td>
                        <td><span class="badge bg-info bg-opacity-10 text-info">${item.jenisUsaha}</span></td>
                        <td>${item.alamat}</td>
                        <td>
                            <a href="data-usaha-member.html?edit=${item.id}" class="btn btn-sm btn-warning"><i class="bi bi-pencil"></i></a>
                            <button class="btn btn-sm btn-danger" onclick="deleteUsaha('${item.id}')"><i class="bi bi-trash"></i></button>
                        </td>`;
                    tbody.appendChild(row);
                });
            }

            window.deleteUsaha = async function(id) {
                if (!confirm('Hapus data ini?')) return;
                try {
                    const res = await apiCall('deleteDataUsaha', { token, id });
                    if (res.success) { alert('Data dihapus.'); fetchData(); }
                    else alert('Gagal: ' + res.message);
                } catch(e) { alert('Error: ' + e.message); }
            };

            // Logout
            window.logout = function() {
                if (typeof appStorage !== 'undefined') appStorage.clear();
                if (token) apiCall('logout', { token }).catch(() => {});
                window.location.href = '../index.html';
            };

            fetchData();
            setInterval(() => { if (!document.hidden) fetchData(); }, 60000);
        })();
    </script>
</body>
</html>
