<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Member Dashboard - BUMA Bantul</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --secondary: #8b5cf6;
      --accent: #06b6d4;
      --dark: #0f172a;
      --light: #f8fafc;
      --card-bg: #ffffff;
      --glass-bg: rgba(255, 255, 255, 0.75);
      --text: #1e293b;
      --text-muted: #64748b;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
      --shadow: 0 4px 6px rgba(0,0,0,0.05);
      --shadow-lg: 0 20px 40px rgba(0,0,0,0.08);
      --radius: 20px;
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --sidebar-width: 260px;
    }
    * { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--light); overflow-x: hidden; }

    #sidebar {
      min-width: var(--sidebar-width); max-width: var(--sidebar-width);
      background: linear-gradient(180deg, #1e1b4b 0%, #312e81 100%);
      color: #fff; transition: all 0.3s; position: fixed; top: 0; left: 0; height: 100vh;
      z-index: 1000; box-shadow: var(--shadow-lg);
    }
    #sidebar .sidebar-header { padding: 30px 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
    #sidebar .sidebar-header h3 { font-weight: 700; font-size: 1.8rem; margin: 0; }
    #sidebar .sidebar-header p { color: rgba(255,255,255,0.6); font-size: 0.9rem; margin-top: 5px; }
    #sidebar ul.components { padding: 20px 0; }
    #sidebar ul li a {
      padding: 15px 25px; display: block; color: rgba(255,255,255,0.7); text-decoration: none;
      font-weight: 500; transition: all 0.3s; border-left: 4px solid transparent; margin: 5px 10px; border-radius: 10px;
    }
    #sidebar ul li a:hover, #sidebar ul li a.active {
      background: rgba(99,102,241,0.2); color: #fff; border-left-color: var(--primary); transform: translateX(5px);
    }
    #sidebar ul li a i { margin-right: 12px; width: 20px; font-size: 1.2rem; }

    #content { width: calc(100% - var(--sidebar-width)); margin-left: var(--sidebar-width); padding: 20px; }
    @media (max-width: 768px) {
      #sidebar { margin-left: calc(-1 * var(--sidebar-width)); }
      #sidebar.active { margin-left: 0; }
      #content { width: 100%; margin-left: 0; }
    }

    .navbar {
      background: rgba(255,255,255,0.75); backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.4); box-shadow: var(--shadow-sm); border-radius: var(--radius);
      margin-bottom: 25px; padding: 15px 25px;
    }
    .stat-card {
      background: white; border-radius: var(--radius); padding: 25px; transition: all 0.3s;
      border: 1px solid rgba(0,0,0,0.04); box-shadow: var(--shadow); text-align: center;
    }
    .stat-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(99,102,241,0.15); }
    .stat-icon {
      width: 70px; height: 70px; border-radius: 20px; display: flex; align-items: center; justify-content: center;
      font-size: 2.2rem; margin: 0 auto 15px;
    }
    .stat-icon.primary { background: #e0e7ff; color: var(--primary); }
    .stat-icon.success { background: #e0f2fe; color: #4cc9f0; }
    .stat-value { font-size: 2.2rem; font-weight: 700; color: var(--text); }
    .stat-label { color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; font-size: 0.9rem; }

    .card {
      border: 1px solid rgba(0,0,0,0.04); border-radius: var(--radius); box-shadow: var(--shadow-lg);
      margin-bottom: 25px; background: white;
    }
    .card-header {
      background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #fff;
      font-weight: 600; padding: 18px 25px; border-radius: var(--radius) var(--radius) 0 0 !important;
    }
    .table { background: white; border-radius: 15px; overflow: hidden; }
    .table thead th { background: #f8fafc; font-weight: 600; text-transform: uppercase; }
    .foto-thumb { width: 50px; height: 50px; object-fit: cover; border-radius: 12px; }

    #mapTambah, #mapEdit {
      height: 250px; border-radius: var(--radius); border: 2px solid #e8ecf1; box-shadow: var(--shadow); z-index: 1;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--secondary)); border: none;
      border-radius: 50px; padding: 10px 20px; font-weight: 600; color: #fff;
    }
    .btn-outline-primary { border-radius: 50px; }
    .current-location-btn { border-radius: 50px; margin-bottom: 10px; }
    .form-control { border-radius: 14px; border: 2px solid #e8ecf1; background: #fafbfc; }
    .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(99,102,241,0.08); }
  </style>
</head>
<body>
  <nav id="sidebar">
    <div class="sidebar-header">
      <h3>BUMA Member</h3>
      <p>Kabupaten Bantul</p>
    </div>
    <ul class="components">
      <li><a href="#" class="active" onclick="showSection('dashboard', this)"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
      <li><a href="#" onclick="showSection('dataUsaha', this)"><i class="bi bi-shop"></i> Data Usaha Saya</a></li>
      <li><a href="#" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Logout</a></li>
    </ul>
  </nav>

  <div id="content">
    <nav class="navbar navbar-expand">
      <div class="container-fluid">
        <button type="button" id="sidebarCollapse" class="btn"><i class="bi bi-list"></i></button>
        <div class="ms-auto">
          <div class="dropdown">
            <button class="btn btn-outline-secondary dropdown-toggle rounded-pill" type="button" data-bs-toggle="dropdown">
              <i class="bi bi-person-circle"></i> <span id="userDisplay">Member</span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
              <li><a class="dropdown-item" href="#" onclick="logout()">Logout</a></li>
            </ul>
          </div>
        </div>
      </div>
    </nav>

    <div id="content-area">
      <!-- Dashboard -->
      <div id="section-dashboard" class="content-section">
        <div class="row g-4">
          <div class="col-md-6">
            <div class="stat-card">
              <div class="stat-icon primary"><i class="bi bi-shop"></i></div>
              <div class="stat-value" id="totalUsaha">0</div>
              <div class="stat-label">Total Usaha Saya</div>
            </div>
          </div>
          <div class="col-md-6">
            <div class="stat-card">
              <div class="stat-icon success"><i class="bi bi-calendar-check"></i></div>
              <div class="stat-value" id="terdaftarSejak">-</div>
              <div class="stat-label">Member Sejak</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Data Usaha Saya -->
      <div id="section-dataUsaha" class="content-section" style="display: none;">
        <div class="row">
          <div class="col-lg-7">
            <div class="card">
              <div class="card-header d-flex justify-content-between align-items-center">
                <span><i class="bi bi-shop"></i> Data Usaha Saya</span>
                <button class="btn btn-outline-light btn-sm rounded-pill" onclick="refreshMyUsaha()"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
              </div>
              <div class="card-body">
                <div class="table-responsive">
                  <table class="table table-hover align-middle" id="myUsahaTable">
                    <thead><tr><th>Foto</th><th>Nama Usaha</th><th>Jenis</th><th>Alamat</th><th>Aksi</th></tr></thead>
                    <tbody></tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
          <div class="col-lg-5">
            <div class="card">
              <div class="card-header"><i class="bi bi-plus-circle"></i> Tambah Usaha Baru</div>
              <div class="card-body">
                <form id="usahaForm">
                  <div class="mb-3"><label class="form-label">Nama Usaha</label><input type="text" class="form-control" id="namaUsaha" placeholder="Nama usaha" required></div>
                  <div class="mb-3"><label class="form-label">Nama Pemilik</label><input type="text" class="form-control" id="pemilik" placeholder="Pemilik" required></div>
                  <div class="mb-3"><label class="form-label">Jenis Usaha</label><input type="text" class="form-control" id="jenisUsaha" placeholder="Jenis usaha" required></div>
                  <div class="mb-3"><label class="form-label">Alamat</label><textarea class="form-control" id="alamat" rows="2" required></textarea></div>
                  <div class="mb-3"><label class="form-label">Telepon</label><input type="text" class="form-control" id="telepon"></div>
                  <div class="mb-3"><label class="form-label">Deskripsi</label><textarea class="form-control" id="deskripsi" rows="3"></textarea></div>
                  <div class="mb-3"><label class="form-label">URL Foto</label><input type="text" class="form-control" id="foto"></div>
                  <div class="mb-3">
                    <label class="form-label">Lokasi Usaha <span class="text-danger">*</span></label>
                    <button type="button" class="btn btn-outline-primary current-location-btn" id="getLocationBtnTambah">
                      <i class="bi bi-crosshair"></i> Dapatkan Lokasi Saya
                    </button>
                    <div id="mapTambah"></div>
                    <div class="row mt-2 g-2">
                      <div class="col-md-6"><label class="form-label small">Latitude</label><input type="text" class="form-control" id="latTambah" readonly required></div>
                      <div class="col-md-6"><label class="form-label small">Longitude</label><input type="text" class="form-control" id="lngTambah" readonly required></div>
                    </div>
                    <small class="text-muted">Klik atau geser marker pada peta.</small>
                  </div>
                  <button type="submit" class="btn btn-primary w-100">Simpan Usaha</button>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Edit -->
  <div class="modal fade" id="editUsahaModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">Edit Data Usaha</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
          <form id="editUsahaForm"><input type="hidden" id="editId">
            <div class="mb-3"><label class="form-label">Nama Usaha</label><input type="text" class="form-control" id="editNamaUsaha" required></div>
            <div class="mb-3"><label class="form-label">Pemilik</label><input type="text" class="form-control" id="editPemilik" required></div>
            <div class="mb-3"><label class="form-label">Jenis Usaha</label><input type="text" class="form-control" id="editJenisUsaha" required></div>
            <div class="mb-3"><label class="form-label">Alamat</label><textarea class="form-control" id="editAlamat" rows="2" required></textarea></div>
            <div class="mb-3"><label class="form-label">Telepon</label><input type="text" class="form-control" id="editTelepon"></div>
            <div class="mb-3"><label class="form-label">Deskripsi</label><textarea class="form-control" id="editDeskripsi" rows="3"></textarea></div>
            <div class="mb-3"><label class="form-label">URL Foto</label><input type="text" class="form-control" id="editFoto"></div>
            <div class="mb-3">
              <label class="form-label">Lokasi Usaha <span class="text-danger">*</span></label>
              <button type="button" class="btn btn-outline-primary current-location-btn" id="getLocationBtnEdit">
                <i class="bi bi-crosshair"></i> Dapatkan Lokasi Saya
              </button>
              <div id="mapEdit"></div>
              <div class="row mt-2 g-2">
                <div class="col-md-6"><label class="form-label small">Latitude</label><input type="text" class="form-control" id="editLat" readonly required></div>
                <div class="col-md-6"><label class="form-label small">Longitude</label><input type="text" class="form-control" id="editLng" readonly required></div>
              </div>
              <small class="text-muted">Klik atau geser marker pada peta.</small>
            </div>
          </form>
        </div>
        <div class="modal-footer"><button class="btn btn-outline-secondary rounded-pill" data-bs-dismiss="modal">Batal</button><button class="btn btn-primary" onclick="updateUsaha()">Simpan</button></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    if (!checkAuth('member')) window.location.href = 'login.html';
    document.getElementById('userDisplay').innerText = sessionStorage.getItem('nama') || 'Member';
    document.getElementById('sidebarCollapse').addEventListener('click', () => {
      document.getElementById('sidebar').classList.toggle('active');
      document.getElementById('content').classList.toggle('active');
    });

    async function logout() {
      const token = sessionStorage.getItem('token');
      if (token) { try { await apiCall('logout', { token }); } catch (e) {} }
      sessionStorage.clear(); window.location.href = 'index.html';
    }

    // ----- DATA GLOBAL & CACHE -----
    let dataUsahaCache = [];
    let mapTambah, markerTambah;

    // Preload data + peta saat halaman pertama dibuka
    async function preloadAll() {
      try {
        const res = await apiCall('getDataUsaha', { token: sessionStorage.getItem('token') });
        if (res.success) {
          dataUsahaCache = res.data;
          sessionStorage.setItem('member_data_usaha', JSON.stringify(dataUsahaCache));
          updateDashboardStats();
          renderMyUsahaTable(dataUsahaCache);
        }
      } catch (e) { console.error(e); }

      // Inisialisasi peta utama (walaupun kontainer tersembunyi, tetap bisa dibuat)
      if (typeof L !== 'undefined') initMapTambah();
    }

    function updateDashboardStats() {
      const data = dataUsahaCache;
      document.getElementById('totalUsaha').innerText = data.length;
      document.getElementById('terdaftarSejak').innerText = '2026';
    }

    // ----- NAVIGASI SECTION -----
    function showSection(section, element) {
      document.querySelectorAll('.content-section').forEach(el => el.style.display = 'none');
      document.getElementById('section-' + section).style.display = 'block';
      document.querySelectorAll('#sidebar ul li a').forEach(link => link.classList.remove('active'));
      if (element) element.classList.add('active');

      if (section === 'dashboard') {
        updateDashboardStats();
      } else if (section === 'dataUsaha') {
        renderMyUsahaTable(dataUsahaCache);
        if (mapTambah) setTimeout(() => mapTambah.invalidateSize(), 100);
      }
    }

    // ----- TABEL USAHA -----
    function renderMyUsahaTable(data) {
      const tbody = document.querySelector('#myUsahaTable tbody');
      if (!tbody) return;
      tbody.innerHTML = '';
      data.forEach(item => {
        const fotoHtml = item.foto ? `<img src="${item.foto}" class="foto-thumb">` : '<span class="text-muted">-</span>';
        tbody.innerHTML += `<tr>
          <td>${fotoHtml}</td>
          <td><strong>${item.namaUsaha}</strong></td>
          <td><span class="badge bg-info bg-opacity-10 text-info">${item.jenisUsaha}</span></td>
          <td>${item.alamat}</td>
          <td>
            <button class="btn btn-sm btn-warning" onclick="editUsaha('${item.id}')"><i class="bi bi-pencil"></i></button>
            <button class="btn btn-sm btn-danger" onclick="deleteUsaha('${item.id}')"><i class="bi bi-trash"></i></button>
          </td></tr>`;
      });
    }

    async function refreshMyUsaha() {
      try {
        const res = await apiCall('getDataUsaha', { token: sessionStorage.getItem('token') });
        if (res.success) {
          dataUsahaCache = res.data;
          sessionStorage.setItem('member_data_usaha', JSON.stringify(dataUsahaCache));
          renderMyUsahaTable(dataUsahaCache);
          updateDashboardStats();
        }
      } catch (e) { console.error(e); }
    }

    // ----- PETA TAMBAH -----
    function initMapTambah(lat = -7.885, lng = 110.363) {
      if (typeof L === 'undefined') return;
      if (mapTambah) mapTambah.remove();
      mapTambah = L.map('mapTambah').setView([lat, lng], 13);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(mapTambah);
      markerTambah = L.marker([lat, lng], { draggable: true }).addTo(mapTambah);
      markerTambah.on('moveend', e => {
        document.getElementById('latTambah').value = e.target.getLatLng().lat.toFixed(6);
        document.getElementById('lngTambah').value = e.target.getLatLng().lng.toFixed(6);
      });
      mapTambah.on('click', e => {
        markerTambah.setLatLng(e.latlng);
        document.getElementById('latTambah').value = e.latlng.lat.toFixed(6);
        document.getElementById('lngTambah').value = e.latlng.lng.toFixed(6);
      });
      document.getElementById('latTambah').value = lat.toFixed(6);
      document.getElementById('lngTambah').value = lng.toFixed(6);
    }

    document.getElementById('getLocationBtnTambah').addEventListener('click', () => {
      if (!mapTambah) return;
      navigator.geolocation.getCurrentPosition(pos => {
        const lat = pos.coords.latitude, lng = pos.coords.longitude;
        mapTambah.setView([lat, lng], 15);
        markerTambah.setLatLng([lat, lng]);
        document.getElementById('latTambah').value = lat.toFixed(6);
        document.getElementById('lngTambah').value = lng.toFixed(6);
      }, err => alert('Gagal mengambil lokasi'));
    });

    // ----- FORM TAMBAH USAHA -----
    document.getElementById('usahaForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = {
        token: sessionStorage.getItem('token'),
        namaUsaha: document.getElementById('namaUsaha').value,
        pemilik: document.getElementById('pemilik').value,
        jenisUsaha: document.getElementById('jenisUsaha').value,
        alamat: document.getElementById('alamat').value,
        telepon: document.getElementById('telepon').value,
        deskripsi: document.getElementById('deskripsi').value,
        foto: document.getElementById('foto').value,
        lat: document.getElementById('latTambah').value,
        lng: document.getElementById('lngTambah').value
      };
      try {
        const res = await apiCall('addDataUsaha', data);
        if (res.success) {
          alert('Data tersimpan');
          document.getElementById('usahaForm').reset();
          refreshMyUsaha(); // otomatis perbarui tabel & dashboard
          initMapTambah(); // reset peta
        } else alert('Gagal: ' + res.message);
      } catch (err) { alert('Error: ' + err.message); }
    });

    // ----- EDIT USAHA -----
    let mapEdit, markerEdit, currentEditLat = -7.885, currentEditLng = 110.363;
    function initMapEdit(lat, lng) {
      if (mapEdit) { mapEdit.remove(); mapEdit = null; }
      mapEdit = L.map('mapEdit').setView([lat, lng], 13);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapEdit);
      markerEdit = L.marker([lat, lng], { draggable: true }).addTo(mapEdit);
      markerEdit.on('moveend', e => {
        document.getElementById('editLat').value = e.target.getLatLng().lat.toFixed(6);
        document.getElementById('editLng').value = e.target.getLatLng().lng.toFixed(6);
      });
      mapEdit.on('click', e => {
        markerEdit.setLatLng(e.latlng);
        document.getElementById('editLat').value = e.latlng.lat.toFixed(6);
        document.getElementById('editLng').value = e.latlng.lng.toFixed(6);
      });
      setTimeout(() => mapEdit.invalidateSize(), 100);
    }

    async function editUsaha(id) {
      try {
        const res = await apiCall('getDataUsahaById', { token: sessionStorage.getItem('token'), id });
        if (res.success) {
          const item = res.data;
          document.getElementById('editId').value = item.id;
          document.getElementById('editNamaUsaha').value = item.namaUsaha;
          document.getElementById('editPemilik').value = item.pemilik;
          document.getElementById('editJenisUsaha').value = item.jenisUsaha;
          document.getElementById('editAlamat').value = item.alamat;
          document.getElementById('editTelepon').value = item.telepon || '';
          document.getElementById('editDeskripsi').value = item.deskripsi || '';
          document.getElementById('editFoto').value = item.foto || '';
          currentEditLat = parseFloat(item.lat) || -7.885;
          currentEditLng = parseFloat(item.lng) || 110.363;
          document.getElementById('editLat').value = currentEditLat.toFixed(6);
          document.getElementById('editLng').value = currentEditLng.toFixed(6);
          new bootstrap.Modal(document.getElementById('editUsahaModal')).show();
          document.getElementById('editUsahaModal').addEventListener('shown.bs.modal', function h() {
            initMapEdit(currentEditLat, currentEditLng);
            document.getElementById('editUsahaModal').removeEventListener('shown.bs.modal', h);
          });
        }
      } catch (e) { alert('Error: ' + e.message); }
    }

    document.getElementById('getLocationBtnEdit').addEventListener('click', () => {
      if (!mapEdit) return;
      navigator.geolocation.getCurrentPosition(pos => {
        mapEdit.setView([pos.coords.latitude, pos.coords.longitude], 15);
        markerEdit.setLatLng([pos.coords.latitude, pos.coords.longitude]);
        document.getElementById('editLat').value = pos.coords.latitude.toFixed(6);
        document.getElementById('editLng').value = pos.coords.longitude.toFixed(6);
      });
    });

    document.getElementById('editUsahaModal').addEventListener('hidden.bs.modal', () => {
      if (mapEdit) { mapEdit.remove(); mapEdit = null; }
    });

    async function updateUsaha() {
      const data = {
        token: sessionStorage.getItem('token'), id: document.getElementById('editId').value,
        namaUsaha: document.getElementById('editNamaUsaha').value,
        pemilik: document.getElementById('editPemilik').value,
        jenisUsaha: document.getElementById('editJenisUsaha').value,
        alamat: document.getElementById('editAlamat').value,
        telepon: document.getElementById('editTelepon').value,
        deskripsi: document.getElementById('editDeskripsi').value,
        foto: document.getElementById('editFoto').value,
        lat: document.getElementById('editLat').value,
        lng: document.getElementById('editLng').value
      };
      try {
        const res = await apiCall('updateDataUsaha', data);
        if (res.success) {
          alert('Data diperbarui');
          bootstrap.Modal.getInstance(document.getElementById('editUsahaModal')).hide();
          refreshMyUsaha();
        } else alert('Gagal: ' + res.message);
      } catch (e) { alert('Error: ' + e.message); }
    }

    async function deleteUsaha(id) {
      if (!confirm('Hapus data ini?')) return;
      try {
        const res = await apiCall('deleteDataUsaha', { token: sessionStorage.getItem('token'), id });
        if (res.success) {
          alert('Data dihapus');
          refreshMyUsaha();
        } else alert('Gagal: ' + res.message);
      } catch (e) { alert('Error: ' + e.message); }
    }

    // ----- INISIALISASI AWAL -----
    window.addEventListener('load', async () => {
      await preloadAll();
      const dashLink = document.querySelector('#sidebar ul li a[onclick*="dashboard"]');
      if (dashLink) showSection('dashboard', dashLink);
      else showSection('dashboard', null);
    });
  </script>
</body>
</html>
